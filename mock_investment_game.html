<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글로벌 모의투자 보드게임</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1, h2, h3, h4 { color: #1e293b; margin-top: 0; }
        .btn { padding: 10px 15px; background: #3b82f6; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn:hover:not(:disabled) { background: #2563eb; }
        .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-success { background: #10b981; }
        .btn-success:hover:not(:disabled) { background: #059669; }
        .btn-danger { background: #ef4444; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }
        .btn-large { padding: 15px 30px; font-size: 18px; width: 100%; border-radius: 8px; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .grid-layout { display: grid; grid-template-columns: 3fr 2fr; gap: 30px; margin-top: 20px; }
        
        .card { padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #f8fafc; margin-bottom: 20px; }
        .metric-box { text-align: center; padding: 15px; background: #eff6ff; border-radius: 8px; border: 1px solid #bfdbfe; }
        .metric-title { font-size: 14px; color: #64748b; margin-bottom: 5px; }
        .metric-value { font-size: 20px; font-weight: bold; color: #1e3a8a; }
        
        .table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        .table th, .table td { padding: 10px; border-bottom: 1px solid #e2e8f0; text-align: left; }
        .table th { background: #f1f5f9; font-weight: 600; color: #475569; }
        
        .text-red { color: #ef4444; }
        .text-blue { color: #3b82f6; }
        .text-black { color: #333; }
        
        .input-group { display: flex; gap: 10px; margin-top: 10px; }
        .input-group input { flex: 1; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; }
        select, input[type="number"], input[type="text"] { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 15px; }
        
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab { padding: 10px 20px; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; font-weight: 600; color: #64748b; }
        .tab.active { border-bottom-color: #3b82f6; color: #3b82f6; }

        .team-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .team-btn { flex: 1; padding: 15px; text-align: center; background: #f1f5f9; border-radius: 8px; cursor: pointer; border: 2px solid transparent; font-weight: bold; color: #64748b; }
        .team-btn.active { background: #eff6ff; border-color: #3b82f6; color: #1e3a8a; }
        .team-btn.bankrupt { background: #fee2e2; color: #ef4444; border-color: #fca5a5; cursor: not-allowed; }
        
        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 15px 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-weight: bold; animation: fadein 0.3s; z-index: 1000; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 20px; opacity: 1; } }

        .quiz-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .quiz-content { background: white; padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; text-align: center; }
        .quiz-btn { display: block; width: 100%; margin: 10px 0; padding: 15px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; cursor: pointer; transition: 0.2s; }
        .quiz-btn:hover { background: #e2e8f0; }

        .back-link { display: inline-block; margin-bottom: 20px; color: #64748b; text-decoration: none; font-weight: 600; }
        .back-link:hover { color: #333; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Data Definitions
        const US_TICKERS = ['AAPL', 'MSFT', 'GOOGL', 'AMZN', 'NVDA', 'TSLA', 'META', 'NFLX', 'AMD', 'INTC', 'DIS', 'SBUX', 'NKE', 'KO', 'PEP', 'MCD', 'WMT', 'BA', 'JPM', 'V', 'GME', 'AMC', 'PLTR', 'COIN', 'RBLX', 'UBER', 'ABNB', 'PFE', 'MRNA', 'MA'];
        const KR_TICKERS = ['005930.KS(삼성전자)', '000660.KS(SK하이닉스)', '373220.KS(LG엔솔)', '207940.KS(삼성바이오)', '005380.KS(현대차)', '035420.KS(NAVER)', '035720.KS(카카오)', '051910.KS(LG화학)', '000270.KS(기아)', '068270.KS(셀트리온)', '005490.KS(POSCO)', '105560.KS(KB금융)', '028260.KS(삼성물산)', '012330.KS(현대모비스)', '066570.KS(LG전자)'];
        
        const MOCK_BASE_PRICES = {
            'USDKRW=X': 1300,
            'AAPL': 150, 'MSFT': 300, 'GOOGL': 120, 'AMZN': 100, 'NVDA': 400, 'TSLA': 200, 'META': 300, 'NFLX': 400, 'AMD': 100, 'INTC': 35,
            'DIS': 90, 'SBUX': 100, 'NKE': 110, 'KO': 60, 'PEP': 170, 'MCD': 280, 'WMT': 150, 'BA': 200, 'JPM': 140, 'V': 230,
            'GME': 20, 'AMC': 5, 'PLTR': 15, 'COIN': 80, 'RBLX': 35, 'UBER': 45, 'ABNB': 120, 'PFE': 35, 'MRNA': 110, 'MA': 390
        };
        
        KR_TICKERS.forEach(t => { MOCK_BASE_PRICES[t] = Math.floor(Math.random() * 80000) + 20000; });

        const QUIZZES = [
            {"question": "어떤 선택을 함으로써 포기해야 하는 대안 중 가장 가치 있는 것을 무엇이라고 할까요?", "options": ["매몰비용", "기회비용", "한계비용"], "answer": 1},
            {"question": "물가가 지속적으로 오르고 화폐 가치가 떨어지는 현상을 무엇이라고 하나요?", "options": ["디플레이션", "스태그플레이션", "인플레이션"], "answer": 2},
            {"question": "원/달러 환율이 올랐습니다(원화 가치 하락). 이때 일반적으로 웃게 되는 사람은 누구일까요?", "options": ["해외 여행객", "수입업자", "수출업자"], "answer": 2},
            {"question": "국방 서비스처럼 돈을 내지 않은 사람도 이용할 수 있어 기업이 스스로 생산하기 꺼리는 재화는?", "options": ["사유재", "공공재", "대체재"], "answer": 1},
            {"question": "시장에서 가격이 알아서 수요와 공급을 조절하는 기능을 빗댄 애덤 스미스의 말은?", "options": ["보이지 않는 손", "보이는 손", "황금 손"], "answer": 0}
        ];

        // Format Utilities
        const fmtKRW = (val) => new Intl.NumberFormat('ko-KR', {style: 'currency', currency: 'KRW', maximumFractionDigits: 0}).format(val);
        const fmtUSD = (val) => new Intl.NumberFormat('en-US', {style: 'currency', currency: 'USD'}).format(val);

        function App() {
            const [scene, setScene] = React.useState('lobby');
            const [settings, setSettings] = React.useState({
                totalTurns: 12, startDate: '2023-01-01', teamCount: 2, 
                teamNames: ['Team 1', 'Team 2']
            });
            const [gameState, setGameState] = React.useState(null);
            const [activeTeamIdx, setActiveTeamIdx] = React.useState(0);
            const [tradeTickers, setTradeTickers] = React.useState({US: 'AAPL', KR: KR_TICKERS[0]});
            const [tradeAmounts, setTradeAmounts] = React.useState({US: 1, KR: 10});
            const [marketTab, setMarketTab] = React.useState('US');
            const [toasts, setToasts] = React.useState([]);
            const [quizModal, setQuizModal] = React.useState(null);

            const showToast = (msg) => {
                const id = Date.now();
                setToasts(prev => [...prev, {id, msg}]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
            };

            const startGame = () => {
                const datesPool = ['2001-01-01', '2005-05-01', '2010-01-01', '2015-05-01', '2020-01-01', '2023-01-01'];
                const sDate = settings.startDate === 'random' ? datesPool[Math.floor(Math.random()*datesPool.length)] : settings.startDate;
                
                // Generate Mock Market Data
                const totalLength = settings.totalTurns + 2;
                const mData = {};
                const allTickers = [...US_TICKERS, ...KR_TICKERS, 'USDKRW=X'];
                allTickers.forEach(t => {
                    let price = MOCK_BASE_PRICES[t] || (Math.random()*100 + 10);
                    mData[t] = [price];
                    // simulate monthly random walk with slight upward drift
                    for(let i=1; i<totalLength; i++) {
                        const change = (Math.random() - 0.45) * 0.15; // -7.5% to +8.25% monthly
                        price = price * (1 + change);
                        mData[t].push(price);
                    }
                });

                const startDateObj = new Date(sDate);
                
                const teams = settings.teamNames.slice(0, settings.teamCount).map(name => ({
                    name,
                    usd_balance: 100000.0,
                    krw_balance: 100000000.0,
                    portfolio: {},
                    is_bankrupt: false
                }));

                setGameState({
                    currentTurn: 1,
                    totalTurns: settings.totalTurns,
                    startDate: startDateObj,
                    currentDate: new Date(startDateObj),
                    marketData: mData,
                    teams: teams,
                    gameOver: false
                });

                showToast("타임머신 탑승 완료! 모의투자를 시작합니다.");
                setScene('game');
                
                if(Math.random() > 0.5) triggerQuiz();
            };

            const getPrice = (ticker, turnOffset = 0) => {
                if(!gameState) return 0;
                const idx = gameState.currentTurn - 1 + turnOffset;
                return gameState.marketData[ticker][idx];
            };

            const calculateTotalValueKRW = (team) => {
                if (team.is_bankrupt) return 0;
                const exRate = getPrice('USDKRW=X');
                let total = team.krw_balance + (team.usd_balance * exRate);
                
                Object.entries(team.portfolio).forEach(([ticker, info]) => {
                    const p = getPrice(ticker);
                    const isKR = ticker.includes('.KS');
                    if (isKR) total += p * info.shares;
                    else total += (p * info.shares) * exRate;
                });
                return total;
            };

            const buyStock = (ticker, amount) => {
                const price = getPrice(ticker);
                const isKR = ticker.includes('.KS');
                const reqMoney = price * amount;
                
                const g = {...gameState};
                const t = g.teams[activeTeamIdx];
                
                if(isKR && t.krw_balance >= reqMoney) {
                    t.krw_balance -= reqMoney;
                } else if (!isKR && t.usd_balance >= reqMoney) {
                    t.usd_balance -= reqMoney;
                } else {
                    alert("잔고가 부족합니다.");
                    return;
                }

                if(t.portfolio[ticker]) {
                    const oldS = t.portfolio[ticker].shares;
                    const oldP = t.portfolio[ticker].avg_price;
                    const newS = oldS + amount;
                    t.portfolio[ticker] = { shares: newS, avg_price: ((oldS*oldP)+(amount*price))/newS };
                } else {
                    t.portfolio[ticker] = { shares: amount, avg_price: price };
                }
                
                setGameState(g);
                showToast(`[${t.name}] ${ticker} ${amount}주 매수 완료!`);
            };

            const sellStock = (ticker, amount) => {
                const g = {...gameState};
                const t = g.teams[activeTeamIdx];
                
                if(!t.portfolio[ticker] || t.portfolio[ticker].shares < amount) {
                    alert('보유 수량이 부족합니다.');
                    return;
                }

                const price = getPrice(ticker);
                const isKR = ticker.includes('.KS');
                const rev = price * amount;

                t.portfolio[ticker].shares -= amount;
                if(t.portfolio[ticker].shares === 0) delete t.portfolio[ticker];

                if(isKR) t.krw_balance += rev;
                else t.usd_balance += rev;

                setGameState(g);
                showToast(`[${t.name}] ${ticker} ${amount}주 매도 완료!`);
            };

            const checkBankruptcy = (g) => {
                const initial = 230000000; // 1억 + 10만$*1300
                g.teams.forEach(t => {
                    if(!t.is_bankrupt) {
                        const val = calculateTotalValueKRW(t);
                        if(val < initial * 0.1) t.is_bankrupt = true;
                    }
                });
            };

            const triggerQuiz = () => {
                const q = QUIZZES[Math.floor(Math.random() * QUIZZES.length)];
                setQuizModal(q);
            };

            const submitQuiz = (selectedIdx) => {
                if(selectedIdx === quizModal.answer) {
                    showToast("정답입니다! 특별 투자 지원금 $5,000 지급!");
                    const g = {...gameState};
                    g.teams.forEach(t => { if(!t.is_bankrupt) t.usd_balance += 5000; });
                    setGameState(g);
                } else {
                    showToast("오답입니다. 아쉽게도 지원금이 없습니다.");
                }
                setQuizModal(null);
            };

            const nextTurn = () => {
                const g = {...gameState};
                checkBankruptcy(g);
                
                if(g.currentTurn >= g.totalTurns) {
                    g.gameOver = true;
                    setScene('ending');
                } else {
                    g.currentTurn += 1;
                    const newDate = new Date(g.currentDate);
                    newDate.setMonth(newDate.getMonth() + 1);
                    g.currentDate = newDate;
                    
                    if(Math.random() > 0.6) triggerQuiz();
                }
                setGameState(g);
            };

            // ---- Render Lobby ----
            if(scene === 'lobby') {
                return (
                    <div className="container">
                        <a href="index.html" className="back-link">← 포트폴리오 메인으로 돌아가기</a>
                        <h1>글로벌 모의투자 보드게임 📈</h1>
                        <div className="card">
                            <h3>1. 게임 기본 설정</h3>
                            <div className="grid-2">
                                <div>
                                    <label>총 게임 길이 (턴/개월)</label>
                                    <input type="number" value={settings.totalTurns} min="8" max="18" onChange={e => setSettings({...settings, totalTurns: parseInt(e.target.value)})} />
                                </div>
                                <div>
                                    <label>시작 시점 선택</label>
                                    <select value={settings.startDate} onChange={e => setSettings({...settings, startDate: e.target.value})}>
                                        <option value="random">랜덤</option>
                                        <option value="2001-01-01">2001-01</option>
                                        <option value="2010-01-01">2010-01</option>
                                        <option value="2020-01-01">2020-01</option>
                                        <option value="2023-01-01">2023-01</option>
                                    </select>
                                </div>
                            </div>

                            <h3 style={{marginTop: '20px'}}>2. 참가 팀 설정</h3>
                            <div style={{marginBottom: '15px'}}>
                                <label>참가할 팀 수 (1~4)</label>
                                <input type="number" min="1" max="4" value={settings.teamCount} onChange={e => setSettings({...settings, teamCount: parseInt(e.target.value)})} />
                            </div>
                            <div className="grid-2">
                                {[...Array(settings.teamCount)].map((_, i) => (
                                    <div key={i}>
                                        <label>팀 {i+1} 이름</label>
                                        <input type="text" value={settings.teamNames[i] || `Team ${i+1}`} 
                                            onChange={e => {
                                                const newNames = [...settings.teamNames];
                                                newNames[i] = e.target.value;
                                                setSettings({...settings, teamNames: newNames});
                                            }} />
                                    </div>
                                ))}
                            </div>
                            
                            <button className="btn btn-large btn-success" style={{marginTop: '20px'}} onClick={startGame}>🚀 과거로 떠나서 투자 게임 시작하기</button>
                        </div>
                    </div>
                );
            }

            // ---- Render Ending ----
            if(scene === 'ending') {
                const sorted = [...gameState.teams].sort((a,b) => calculateTotalValueKRW(b) - calculateTotalValueKRW(a));
                return (
                    <div className="container" style={{textAlign:'center'}}>
                        <h1 style={{fontSize:'40px'}}>🏆 투자 게임 종료 🏆</h1>
                        <p style={{fontSize:'20px', color:'#64748b'}}>최종 성적 발표</p>
                        
                        <div style={{maxWidth:'600px', margin:'0 auto'}}>
                            {sorted.map((t, idx) => (
                                <div key={t.name} className="card" style={{display:'flex', justifyContent:'space-between', alignItems:'center', background: idx===0 ? '#fef3c7' : '#f8fafc', borderColor: idx===0 ? '#f59e0b' : '#e2e8f0'}}>
                                    <h2 style={{margin:0}}>{idx+1}위: {t.name} {t.is_bankrupt && <span className="text-red">(파산)</span>}</h2>
                                    <h3 style={{margin:0, color: idx===0 ? '#d97706' : '#1e3a8a'}}>{fmtKRW(calculateTotalValueKRW(t))}</h3>
                                </div>
                            ))}
                        </div>
                        
                        <button className="btn btn-large" style={{marginTop:'30px', maxWidth:'300px'}} onClick={() => setScene('lobby')}>로비로 돌아가기</button>
                    </div>
                );
            }

            // ---- Render Game ----
            const activeTeam = gameState.teams[activeTeamIdx];
            const currentYearMonth = `${gameState.currentDate.getFullYear()}년 ${String(gameState.currentDate.getMonth()+1).padStart(2,'0')}월`;
            
            return (
                <div className="container">
                    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                        <div>
                            <h1>글로벌 모의투자 보드게임 📈</h1>
                            <h3 style={{color:'#64748b'}}>Turn: {gameState.currentTurn} / {gameState.totalTurns} &nbsp;&nbsp;|&nbsp;&nbsp; 🗓️ {currentYearMonth} &nbsp;&nbsp;|&nbsp;&nbsp; 💵 원/달러 환율: {fmtKRW(getPrice('USDKRW=X'))}</h3>
                        </div>
                        <button className="btn btn-large btn-success" style={{width:'auto'}} onClick={nextTurn}>다음 턴으로 넘어가기 ⏭️</button>
                    </div>

                    <div className="team-nav">
                        {gameState.teams.map((t, idx) => (
                            <div key={t.name} className={`team-btn ${activeTeamIdx === idx ? 'active' : ''} ${t.is_bankrupt ? 'bankrupt' : ''}`} onClick={() => !t.is_bankrupt && setActiveTeamIdx(idx)}>
                                {t.name} {t.is_bankrupt ? '(파산)' : ''}
                            </div>
                        ))}
                    </div>

                    {activeTeam.is_bankrupt ? (
                        <div className="card" style={{textAlign:'center', background:'#fef2f2', color:'#ef4444'}}>
                            <h2>금융 위기가 찾아왔습니다... 이 팀은 파산했습니다.</h2>
                        </div>
                    ) : (
                        <div className="grid-layout">
                            {/* Left: Portfolio & Market */}
                            <div>
                                <div className="card">
                                    <h3>💼 {activeTeam.name}의 포트폴리오 요약</h3>
                                    <div className="grid-3">
                                        <div className="metric-box"><div className="metric-title">총 자산 추정(KRW)</div><div className="metric-value">{fmtKRW(calculateTotalValueKRW(activeTeam))}</div></div>
                                        <div className="metric-box"><div className="metric-title">보유 KRW 현금</div><div className="metric-value" style={{color:'#059669'}}>{fmtKRW(activeTeam.krw_balance)}</div></div>
                                        <div className="metric-box"><div className="metric-title">보유 USD 현금</div><div className="metric-value" style={{color:'#059669'}}>{fmtUSD(activeTeam.usd_balance)}</div></div>
                                    </div>
                                    
                                    <table className="table">
                                        <thead>
                                            <tr><th>종목</th><th>수량</th><th>평단가</th><th>현재가</th><th>수익률</th><th>매도</th></tr>
                                        </thead>
                                        <tbody>
                                            {Object.keys(activeTeam.portfolio).length === 0 ? 
                                                <tr><td colSpan="6" style={{textAlign:'center', color:'#64748b'}}>보유 중인 주식이 없습니다.</td></tr> :
                                                Object.entries(activeTeam.portfolio).map(([ticker, info]) => {
                                                    const curPrice = getPrice(ticker);
                                                    const isKR = ticker.includes('.KS');
                                                    const retRate = ((curPrice - info.avg_price)/info.avg_price*100).toFixed(2);
                                                    const retColor = retRate > 0 ? 'text-red' : (retRate < 0 ? 'text-blue' : 'text-black');
                                                    
                                                    return (
                                                        <tr key={ticker}>
                                                            <td>{ticker}</td>
                                                            <td>{info.shares}주</td>
                                                            <td>{isKR ? fmtKRW(info.avg_price) : fmtUSD(info.avg_price)}</td>
                                                            <td>{isKR ? fmtKRW(curPrice) : fmtUSD(curPrice)}</td>
                                                            <td className={retColor}>{retRate > 0 ? '+'+retRate : retRate}%</td>
                                                            <td><button className="btn btn-danger" style={{padding:'5px 10px'}} onClick={() => sellStock(ticker, info.shares)}>전량매도</button></td>
                                                        </tr>
                                                    )
                                                })
                                            }
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            
                            {/* Right: Trading Terminal */}
                            <div>
                                <div className="card">
                                    <h3>🛒 주식 트레이딩 데스크</h3>
                                    <div className="tabs">
                                        <div className={`tab ${marketTab === 'US' ? 'active' : ''}`} onClick={()=>setMarketTab('US')}>미국 주식(USD)</div>
                                        <div className={`tab ${marketTab === 'KR' ? 'active' : ''}`} onClick={()=>setMarketTab('KR')}>한국 주식(KRW)</div>
                                    </div>
                                    
                                    <label>매수할 종목 선택</label>
                                    <select value={marketTab === 'US' ? tradeTickers.US : tradeTickers.KR} 
                                            onChange={e => setTradeTickers({...tradeTickers, [marketTab]: e.target.value})}>
                                        {(marketTab === 'US' ? US_TICKERS : KR_TICKERS).map(t => (
                                            <option key={t} value={t}>{t}</option>
                                        ))}
                                    </select>
                                    
                                    <div className="metric-box" style={{marginBottom:'15px', background:'#f8fafc', borderColor:'#e2e8f0'}}>
                                        <div className="metric-title">현재 1주당 가격</div>
                                        <div className="metric-value">
                                            {marketTab === 'US' ? fmtUSD(getPrice(tradeTickers.US)) : fmtKRW(getPrice(tradeTickers.KR))}
                                        </div>
                                    </div>

                                    <label>주문 수량</label>
                                    <div className="input-group">
                                        <input type="number" min="1" 
                                            value={marketTab === 'US' ? tradeAmounts.US : tradeAmounts.KR} 
                                            onChange={e => setTradeAmounts({...tradeAmounts, [marketTab]: Math.max(1, parseInt(e.target.value)||1)})} />
                                        <button className="btn" style={{flex:1}} 
                                            onClick={() => buyStock(marketTab === 'US' ? tradeTickers.US : tradeTickers.KR, marketTab === 'US' ? tradeAmounts.US : tradeAmounts.KR)}>
                                            매수 카트에 담기
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {quizModal && (
                        <div className="quiz-modal">
                            <div className="quiz-content">
                                <h2 style={{color: '#d97706'}}>⚠️ 경제 금융 퀴즈 출현!</h2>
                                <p style={{fontSize:'18px', marginBottom:'20px'}}><strong>{quizModal.question}</strong></p>
                                {quizModal.options.map((opt, i) => (
                                    <button key={i} className="quiz-btn" onClick={() => submitQuiz(i)}>{i+1}. {opt}</button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
