                description: "카페 아르바이트생을 부당하게 해고하고 노조 가입을 방해한 악덕 사장을 고발합니다.",
                quizzes: [
                    { question: "헌법에 보장된 근로자의 기본적 권리인 '노동 3권'에 해당하지 않는 것은?", options: ["단결권", "단체교섭권", "단체행동권", "평등권"], answer: "평등권", reward_title: "헌법 제33조 (노동 3권)", reward_text: "① 근로자는 근로조건의 향상을 위하여 자주적인 단결권·단체교섭권 및 단체행동권을 가진다.\n② 공무원인 근로자는 법률이 정하는 자에 한하여 단결권·단체교섭권 및 단체행동권을 가진다." },
                    { question: "근로 조건의 최저 기준을 정하여 근로자의 기본적 생활을 보장하는 법률은?", options: ["민법", "근로기준법", "상법", "형법"], answer: "근로기준법", reward_title: "근로기준법 제23조 (해고 등의 제한)", reward_text: "① 사용자는 근로자에게 정당한 이유 없이 해고, 휴직, 정직, 전직, 감봉, 그 밖의 징벌(이하 '부당해고등')을 하지 못한다." },

                    { speaker: "enemy", name: "악덕 사장", text: "내 가게에서 내 맘대로 알바생 자르는 게 무슨 죕니까! 언제든지 자를 수 있는 거 아닙니까!", press_text: "사장: 내 가게 운영은 내 자유 아닙니까? 직원 하나 자르는 것도 마음대로 못합니까?", player_text: "이의 있습니다! 사장님은 법에서 정한 해고의 정당한 요건과 절차를 지키지 않았습니다. 관련 법안을 제출합니다.", correct_evidence: "근로기준법 제23조 (해고 등의 제한)" },

                    { speaker: "enemy", name: "악덕 사장", text: "으아아! 하지만 애초에 정식으로 고용된 것도 아니었습니다. 계약서도 안 썼다고요!", press_text: "사장: 계약서가 없으면 정식 고용이 아니라는 뜻 아닙니까? 그래서 문제도 없는 겁니다!", player_text: "이의 있습니다! 근로계약서 미작성은 오히려 사장님의 중대한 위법 행위입니다. 처벌 조항을 확인하십시오!", correct_evidence: "근로기준법 제17조 (근로조건의 명시)" }

                quizzes: [
                    { question: "스스로 술을 마셔 심신장애를 유발하고 범죄를 저지른 경우, 형을 감경받을 수 없도록 규정한 원칙은?", options: ["원인에 있어서 자유로운 행위", "일사부재리의 원칙", "무죄 추정의 원칙", "정당방위"], answer: "원인에 있어서 자유로운 행위", reward_title: "형법 제10조 제3항", reward_text: "③ 위험의 발생을 예견하고 자의로 심신장애를 야기한 자의 행위에는 심신장애 감면 규정을 적용하지 아니한다." },
                    { question: "범죄 사실을 객관적으로 증명할 수 있는 과학적 자료를 무엇이라 하는가?", options: ["증명서", "증거", "판례", "영장"], answer: "증거", reward_title: "혈중알코올농도 감정서", reward_text: "[국과수 감정서] 피의자의 혈중알코올농도는 0.18%로 측정되었음. 이는 면허 취소 기준을 크게 초과한 만취 상태임." },

                trial_dialogues: [
                    { speaker: "enemy", name: "만취 피고인", text: "판사님, 억울합니다! 회식에서 필름이 끊겨서 운전대를 잡은 기억조차 안 납니다. 저는 아무것도 모르는 심신상실 상태였다고요!", press_text: "피고인: 기억이 없는데 어떻게 제 책임이 된다는 겁니까? 저는 판단할 수 없는 상태였습니다!", player_text: "이의 있습니다! 스스로 술을 마셔 심신장애를 유발한 자는 처벌을 피할 수 없습니다!", correct_evidence: "형법 제10조 제3항" },
                    { speaker: "enemy", name: "만취 피고인", text: "큭...! 제가 그렇게까지 이성을 잃었다는 객관적인 증거가 있습니까? 그냥 술냄새 조금 난 거 아닙니까!", press_text: "피고인: 기계 수치 하나로 만취라고 단정할 수 있습니까? 과장된 것 아닙니까?", player_text: "이의 있습니다! 사건 직후 확인된 과학적이고 명백한 증거 자료를 제출합니다. 면허 취소 수준을 아득히 넘겼습니다!", correct_evidence: "혈중알코올농도 감정서" },

                    { speaker: "enemy", name: "악플러", text: "제가 언제 그 애 이름을 썼습니까! 그냥 'ㄱㅎㅇ'라고 초성만 썼을 뿐입니다! 세상에 'ㄱㅎㅇ'가 한둘입니까! 누군지 절대 모릅니다!", press_text: "악플러: 이름도 안 썼는데 어떻게 그 사람을 욕한 게 됩니까?", player_text: "이의 있습니다! 실명을 쓰지 않았더라도 게시글의 문맥과 동급생들의 증언을 종합하면 피해자를 지칭하는 것이 명백합니다!", correct_evidence: "특정성 성립 대법원 판례" },
                    { speaker: "enemy", name: "악플러", text: "게다가 그 얘긴 그냥 친한 친구 3명이 있는 단톡방에서 뒷담화 좀 한 게 전부라고요! 게시판에 대놓고 쓴 것도 아닌데 무슨 죄가 됩니까!", press_text: "악플러: 사적인 방에서 우리끼리 한 말인데 이걸 명예훼손으로 고소하다니 말도 안 됩니다!", player_text: "이의 있습니다! 비록 소수의 단톡방이라 하더라도, 거기서 나온 말이 학교 전체로 퍼질 수 있으므로 법적 요건을 충족합니다!", correct_evidence: "공연성 (전파가능성 이론)" },
                    { speaker: "enemy", name: "악플러", text: "허위 사실을 퍼뜨렸다고요? 전 그냥 떠도는 소문을 듣고 재밌어서 옮긴 것뿐입니다! 제가 지어낸 거짓말이 아니라고요!", press_text: "악플러: 남한테 들은 얘기를 전달한 것도 죄가 됩니까?", player_text: "이의 있습니다! 사실 확인 없이 비방할 목적으로 허위 소문을 인터넷을 통해 유포한 행위 자체가 심각한 범죄입니다!", correct_evidence: "정보통신망법 제70조 (사이버 명예훼손)" },
                    { speaker: "enemy", name: "악플러", text: "쳇! 좋아, 그건 그렇다 쳐도 나중에 그냥 욕설 몇 번 한 겁니다! 사람을 때린 것도 아니고 기분 좀 나쁘게 한 건데 무슨 처벌씩이나 합니까!", press_text: "악플러: 그냥 화나서 심한 말 좀 한 건데, 이걸로 감옥에 가는 건 오버 아닙니까?", player_text: "이의 있습니다! 여러 사람이 보는 곳에서 피해자의 인격을 짓밟은 욕설은 정당한 표현의 자유가 아닙니다!", correct_evidence: "형법 제311조 (모욕)" },
                    { speaker: "enemy", name: "악플러", text: "아, 아니... 애초에 저는 완전히 익명으로 글을 썼다고요! 로그인도 안 했는데 경찰이 무슨 수로 제 IP를 추적했다는 겁니까! 불법적으로 제 정보를 캐낸 거 아닙니까!", press_text: "악플러: 익명 보장이 생명인 커뮤니티에서 제 신원을 알아낸 건 경찰의 불법 수사입니다!", player_text: "이의 있습니다! 경찰은 아무 근거 없이 당신을 찾아낸 것이 아닙니다. 법원이 발부한 적법한 영장에 의해 당신의 접속 기록이 확보되었습니다!", correct_evidence: "포털 접속 IP 압수수색 영장" }
                ]
            }
        };

        const bonus_evidence_pool = [
            { title: "CCTV 추가 캡처본", text: "사건 당시 현장을 더 선명하게 보여주는 보조 자료. 최종 점수 보너스에 반영된다." },
            { title: "증인 진술서", text: "상대방 진술의 신빙성을 약화시키는 보조 자료. 반박 성공 시 점수 보너스." },
            { title: "메신저 대화 캡처", text: "상대 주장과 모순되는 대화 기록. 숨겨진 보조 증거로 사용된다." }
        ];

        function MockTrialGame() {
            const [stage, setStage] = useState("scenario_select");
            const [inventory, setInventory] = useState({});
            const [quizIndex, setQuizIndex] = useState(0);
            const [presentedEvidence, setPresentedEvidence] = useState([]);
            const [lives, setLives] = useState(3);
            const [currentScenario, setCurrentScenario] = useState("");
            const [score, setScore] = useState(0);
            const [combo, setCombo] = useState(0);
            const [maxCombo, setMaxCombo] = useState(0);
            const [hintCount, setHintCount] = useState(2);
            const [usedHints, setUsedHints] = useState(0);
            const [trust, setTrust] = useState(100);
            const [bonusEvidence, setBonusEvidence] = useState([]);
            const [badges, setBadges] = useState([]);
            const [courtIndex, setCourtIndex] = useState(0);
            const [pressedMode, setPressedMode] = useState(false);
            const [currentHint, setCurrentHint] = useState("");
            const [messages, setMessages] = useState([]); // For displaying feedback toast messages

            const [animState, setAnimState] = useState("");

            useEffect(() => {
                if (animState) {
                    const timer = setTimeout(() => setAnimState(""), 500);
                    return () => clearTimeout(timer);
                }
            }, [animState]);

            const showMessage = (msg, type = 'info') => {
                setMessages(prev => [...prev, { id: Date.now(), text: msg, type }]);
                setTimeout(() => {
                    setMessages(prev => prev.slice(1));
                }, 3000);
            };

            const resetGame = () => {
                setStage("scenario_select");
                setInventory({});
                setQuizIndex(0);
                setPresentedEvidence([]);
                setLives(3);
                setCurrentScenario("");
                setScore(0);
                setCombo(0);
                setMaxCombo(0);
                setHintCount(2);
                setUsedHints(0);
                setTrust(100);
                setBonusEvidence([]);
                setBadges([]);
                setCourtIndex(0);
                setPressedMode(false);
                setCurrentHint("");
            };

            const getBonusScoreFromInventory = () => Math.min(bonusEvidence.length * 3, 15);

            const tryGetBonusEvidence = () => {
                if (Math.random() < 0.30) {
                    const bonus = bonus_evidence_pool[Math.floor(Math.random() * bonus_evidence_pool.length)];
                    if (!inventory[bonus.title]) {
                        setInventory(prev => ({ ...prev, [bonus.title]: bonus.text }));
                        setBonusEvidence(prev => [...prev, bonus.title]);
                        setScore(prev => prev + 10);
                        showMessage(`🎁 숨겨진 증거 발견: ${bonus.title}`, 'success');
                    }
                }
            };

            const handleCorrect = (baseScore = 10) => {
                setAnimState("flash-green");
                setCombo(prev => {
                    const newCombo = prev + 1;
                    setMaxCombo(m => Math.max(m, newCombo));
                    const comboBonus = Math.min(newCombo * 2, 10);
                    setScore(s => s + baseScore + comboBonus);
                    return newCombo;
                });
            };

            const handleWrong = (lifePenalty = 1, trustPenalty = 10) => {
                setAnimState("flash-red");
                setCombo(0);
                setLives(prev => {
                    const nextLives = prev - lifePenalty;
                    if (nextLives <= 0 || trust - trustPenalty <= 0) {
                        setTimeout(() => setStage("game_over"), 500);
                    }
                    return nextLives;
                });
                setTrust(prev => Math.max(0, prev - trustPenalty));
            };

            const calculateGrade = () => {
                if (score >= 180 && lives === 3 && trust >= 80 && usedHints === 0) return "S";
                if (score >= 140 && trust >= 60) return "A";
                if (score >= 100) return "B";
                if (score >= 60) return "C";
                return "D";
            };

            const determineEnding = () => {
                if (score >= 180 && lives === 3 && trust >= 80 && usedHints === 0) return "완전 승소 엔딩";
                if (trust >= 70 && score >= 130) return "정의 실현 엔딩";
                if (trust >= 50 && score >= 90) return "간신히 승소 엔딩";
                if (usedHints >= 2 && score >= 80) return "고군분투 승소 엔딩";
                return "증거 불충분 속 힘겨운 승소 엔딩";
            };

            const assignBadges = () => {
                let bg = [];
                if (usedHints === 0) bg.push("🧠 추리 천재");
                if (maxCombo >= 5) bg.push("🔥 완벽 반박러");
                if (bonusEvidence.length >= 2) bg.push("🕵️ 숨은 증거 수집가");
                if (lives === 3) bg.push("💎 퍼펙트 변론가");
                if (trust >= 90) bg.push("⚖️ 법정의 신뢰");
                if (score >= 180) bg.push("🏆 역전의 명수");
                setBadges(bg);
            };

            const renderSidebar = () => (
                <div className="w-80 glass-panel p-6 flex flex-col gap-6" style={{ minHeight: '100vh', position: 'sticky', top: 0 }}>
                    <div className="text-center mb-4 cursor-pointer" onClick={() => window.location.href='index.html'}>
                        <h2 className="text-xl font-bold flex items-center justify-center gap-2 text-indigo-300 hover:text-indigo-200">
                            <i data-lucide="arrow-left"></i> 대시보드로 돌아가기
                        </h2>
                    </div>

                    <div>
                        <h2 className="text-2xl font-bold mb-4 border-b border-slate-700 pb-2 flex items-center gap-2">
                            <i data-lucide="scale"></i> 변호사 상태창
                        </h2>
                        
                        <div className="text-xl mb-4">
                            남은 기회: {'❤️'.repeat(Math.max(0, lives))}{'🖤'.repeat(3 - Math.max(0, lives))}
                        </div>
                        
                        <div className="mb-2 flex justify-between">
                            <span>법정 신뢰도</span>
                            <span className={trust < 50 ? 'text-red-400 font-bold' : ''}>{trust}/100</span>
                        </div>
                        <div className="w-full bg-slate-700 rounded-full h-3 mb-6">
                            <div className={`h-3 rounded-full transition-all ${trust < 30 ? 'bg-red-500' : trust < 60 ? 'bg-yellow-500' : 'bg-green-500'}`} style={{ width: `${Math.max(0, trust)}%` }}></div>
                        </div>
                    </div>

                    <div>
                        <h3 className="font-semibold text-slate-300 mb-3 border-b border-slate-700 pb-1">🏅 플레이 기록</h3>
                        <div className="flex justify-between mb-1"><span>점수:</span> <span>{score}</span></div>
                        <div className="flex justify-between mb-1"><span>콤보:</span> <span>{combo}</span></div>
                        <div className="flex justify-between mb-1"><span>최대 콤보:</span> <span>{maxCombo}</span></div>
                        <div className="flex justify-between mb-1"><span>남은 힌트:</span> <span>{hintCount}</span></div>
                        <div className="flex justify-between mb-1"><span>숨겨진 증거:</span> <span>{bonusEvidence.length}개</span></div>
                    </div>

                    <div className="flex-grow">
                        <h3 className="font-semibold text-slate-300 mb-3 border-b border-slate-700 pb-1">🧳 법적 무기 (인벤토리)</h3>
                        {Object.keys(inventory).length === 0 ? (
                            <div className="text-sm text-slate-500 italic">아직 획득한 법 조항이 없습니다.</div>
                        ) : (
                            <div className="flex flex-col gap-2 max-h-64 overflow-y-auto pr-2">
                                {Object.entries(inventory).map(([title, text], idx) => (
                                    <div key={idx} className="bg-slate-800 p-3 rounded border border-slate-600">
                                        <div className="font-bold text-indigo-300 text-sm">{title}</div>
                                        <div className="text-xs text-slate-400 mt-1 leading-relaxed">{text}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );

            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            return (
                <div className={`flex flex-col lg:flex-row min-h-screen ${animState}`}>
                    {renderSidebar()}
                    
                    <div className="flex-1 p-8 max-w-5xl mx-auto relative">
                        {/* Toast Messages */}
                        <div className="fixed top-4 right-4 z-50 flex flex-col gap-2">
                            {messages.map(m => (
                                <div key={m.id} className={`px-4 py-3 rounded shadow-lg fade-in font-bold ${m.type === 'error' ? 'bg-red-500 text-white' : m.type === 'success' ? 'bg-green-500 text-white' : 'bg-slate-800 text-white'}`}>
                                    {m.text}
                                </div>
                            ))}
                        </div>

                        {stage === "scenario_select" && (
                            <div className="fade-in">
                                <h1 className="text-4xl font-bold mb-2">사회 모의재판: 역전의 명수 🏛️</h1>
                                <p className="text-slate-400 text-lg mb-8">담당할 사건 시나리오를 선택하세요.</p>

                                <div className="grid gap-6 md:grid-cols-2">
                                    {Object.entries(scenario_data).map(([title, data], idx) => (
                                        <div key={idx} 
                                            className={`glass-panel p-6 cursor-pointer border-2 transition-all ${currentScenario === title ? 'border-indigo-500 bg-slate-800/80' : 'border-transparent hover:border-slate-500'}`}
                                            onClick={() => setCurrentScenario(title)}>
                                            <h3 className="text-xl font-bold text-indigo-300 mb-2">{title}</h3>
                                            <p className="text-slate-300 leading-relaxed">{data.description}</p>
                                        </div>
                                    ))}
                                </div>

                                <div className="mt-10 text-center">
                                    <button 
                                        className="btn-primary text-xl px-12 py-4"
                                        disabled={!currentScenario}
                                        onClick={() => setStage("quiz")}>
                                        수사 시작 / 증거 수집
                                    </button>
                                </div>
                            </div>
                        )}

                        {stage === "quiz" && (() => {
                            const data = scenario_data[currentScenario];
                            const quizzes = data.quizzes;
                            
                            if (quizIndex >= quizzes.length) {
                                return (
                                    <div className="text-center py-20 fade-in">
                                        <div className="text-6xl mb-6">🔍</div>
                                        <h2 className="text-3xl font-bold mb-4 text-green-400">모든 증거 수집을 완료했습니다!</h2>
                                        <p className="text-xl text-slate-300 mb-8">이제 확보한 증거들을 가지고 법정에 출석해 재판을 진행하십시오.</p>
                                        <button className="btn-primary text-xl px-10 py-3" onClick={() => { setCurrentHint(""); setStage("trial"); }}>
                                            법정으로 이동
                                        </button>
                                    </div>
                                );
                            }

                            const q = quizzes[quizIndex];
                            
                            return (
                                <div className="fade-in max-w-3xl mx-auto">
                                    <h1 className="text-3xl font-bold mb-2">사전 수사: 증거 수집 🔍</h1>
                                    <p className="text-slate-400 mb-6">재판에 필요한 법 조항과 증거를 모으기 위해 문제를 해결하세요.</p>
                                    
                                    <div className="bg-slate-800 rounded-full h-3 mb-8 overflow-hidden">
                                        <div className="bg-indigo-500 h-full transition-all" style={{width: `${(quizIndex / quizzes.length) * 100}%`}}></div>
                                    </div>

                                    <div className="glass-panel p-8 mb-8">
                                        <div className="text-indigo-400 font-bold mb-2">질문 {quizIndex + 1} / {quizzes.length}</div>
                                        <h2 className="text-2xl font-bold mb-6 leading-relaxed">{q.question}</h2>

                                        {currentHint && <div className="bg-indigo-900/50 border border-indigo-500 text-indigo-200 p-4 rounded mb-6 fade-in">{currentHint}</div>}

                                        <div className="grid gap-3 mb-8">
                                            {q.options.map((opt, idx) => (
                                                <button key={idx} 
                                                    className="w-full text-left bg-slate-800 hover:bg-slate-700 border border-slate-600 p-4 rounded text-lg transition-colors"
                                                    onClick={() => {
                                                        setCurrentHint("");
                                                        if(opt === q.answer) {
                                                            handleCorrect(10);
                                                            setInventory(prev => ({...prev, [q.reward_title]: q.reward_text}));
                                                            showMessage(`[정답] 단서 확보: ${q.reward_title}`, 'success');
                                                            tryGetBonusEvidence();
                                                            setQuizIndex(prev => prev + 1);
                                                        } else {
                                                            handleWrong(1, 5);
                                                            showMessage(`오답입니다. 법령을 다시 확인하세요.`, 'error');
                                                        }
                                                    }}>
                                                    {opt}
                                                </button>
                                            ))}
                                        </div>

                                        <div className="flex justify-between items-center text-sm border-t border-slate-700 pt-4">
                                            <button className="text-indigo-400 hover:text-indigo-300 font-bold flex items-center gap-1"
                                                onClick={() => {
                                                    if(hintCount > 0) {
                                                        setHintCount(p => p - 1);
                                                        setUsedHints(p => p + 1);
                                                        setScore(p => Math.max(0, p - 5));
                                                        setTrust(p => Math.max(0, p - 3));
                                                        setCurrentHint(`정답의 첫 글자는 '${q.answer[0]}' 입니다.`);
                                                    } else {
                                                        showMessage("남은 힌트가 없습니다.", "error");
                                                    }
                                                }}>
                                                💡 힌트 사용 (잔여: {hintCount})
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {stage === "trial" && (() => {
                            const data = scenario_data[currentScenario];
                            const dialogues = data.trial_dialogues;
                            
                            if (courtIndex >= dialogues.length) {
                                setTimeout(() => setStage("win"), 100);
                                return <div className="text-center py-20 text-xl">판결 내리는 중...</div>;
                            }

                            const d = dialogues[courtIndex];

                            return (
                                <div className="fade-in max-w-5xl mx-auto h-full flex flex-col">
                                    <div className="text-center mb-6">
                                        <h1 className="text-3xl font-bold">진실의 법정 ⚖️</h1>
                                        <p className="text-slate-400 mt-2">{currentScenario}</p>
                                        <div className="bg-slate-800 max-w-md mx-auto rounded-full h-2 mt-4 overflow-hidden">
                                            <div className="bg-red-500 h-full transition-all" style={{width: `${(courtIndex / dialogues.length) * 100}%`}}></div>
                                        </div>
                                    </div>

                                    <div className="grid md:grid-cols-2 gap-8 flex-1">
                                        {/* Enemy Side */}
                                        <div className="glass-panel p-6 flex flex-col items-center justify-center relative border-t-4 border-red-500">
                                            <div className="text-6xl mb-4">🦇</div>
                                            <h3 className="text-xl font-bold mb-4 text-red-400">{d.name}의 주장</h3>
                                            
                                            <div className="bg-red-950/40 border border-red-800/50 p-6 rounded-lg w-full mb-6">
                                                <p className="text-lg leading-relaxed font-semibold italic">"{d.text}"</p>
                                            </div>

                                            {pressedMode && (
                                                <div className="bg-orange-900/50 border border-orange-500/50 text-orange-200 p-4 rounded-lg w-full mb-6 fade-in text-sm space-y-2">
                                                    <div>🔍 {d.press_text}</div>
                                                    <div className="opacity-70 italic text-xs">상대의 진술에 미세한 모순이 보입니다... 해당 주장을 논파할 증거를 제출하세요.</div>
                                                </div>
                                            )}

                                            {!pressedMode && (
                                                <button className="btn-warning w-full" onClick={() => { setPressedMode(true); setScore(p => p + 3); }}>
                                                    🔍 발언을 깊이 추궁한다 (+3점)
                                                </button>
                                            )}
                                        </div>

                                        {/* Player Side */}
                                        <div className="glass-panel p-6 border-t-4 border-indigo-500 flex flex-col">
                                            <h3 className="text-xl font-bold mb-2 text-indigo-300 flex items-center gap-2">
                                                <span>💼 변호인 측 증거 제출</span>
                                            </h3>
                                            <p className="text-slate-400 text-sm mb-6">상대방의 주장을 완벽하게 논파할 법적 근거를 선택하여 [이의 있음!]을 외치세요.</p>

                                            <div className="flex-1 flex flex-col gap-4">
                                                {currentHint && <div className="bg-indigo-900/50 border border-indigo-500 text-indigo-200 p-3 rounded fade-in text-sm">{currentHint}</div>}

                                                {Object.keys(inventory).length > 0 ? (
                                                    <div className="space-y-3 mt-4">
                                                    {Object.keys(inventory).map(invKey => (
                                                        <button key={invKey} 
                                                            className={`w-full text-left p-4 rounded border transition-all ${
                                                                'bg-slate-800 border-slate-600 hover:border-indigo-400 hover:bg-slate-700'
                                                            }`}
                                                            onClick={e => {
                                                                setCurrentHint("");
                                                                if (invKey === d.correct_evidence) {
                                                                    const pressedBonus = pressedMode ? 5 : 0;
                                                                    handleCorrect(20 + pressedBonus + getBonusScoreFromInventory());
                                                                    showMessage(`나의 반박: "${d.player_text}"`, 'success');
                                                                    setTimeout(() => {
                                                                        showMessage(`재판장: 타당한 증거이므로 이를 인정합니다!`, 'info');
                                                                    }, 500);
                                                                    setPresentedEvidence(p => [...p, invKey]);
                                                                    setPressedMode(false);
                                                                    setCourtIndex(p => p + 1);
                                                                } else {
                                                                    handleWrong(1, 15);
                                                                    showMessage(`재판장: 기각합니다! 해당 증거는 본 발언을 반박하기 부적절합니다.`, 'error');
                                                                    setPressedMode(false);
                                                                }
                                                            }}>
                                                            <div className="font-bold text-slate-100">{invKey}</div>
                                                        </button>
                                                    ))}
                                                    </div>
                                                ) : (
                                                    <div className="text-red-400 italic mt-10 text-center">수집한 증거가 하나도 없습니다! 게임 오버 위기!</div>
                                                )}
                                            </div>

                                            <div className="mt-8 text-right border-t border-slate-700 pt-4">
                                                <button className="text-indigo-400 font-bold hover:text-indigo-300 text-sm"
                                                    onClick={() => {
                                                        if(hintCount > 0) {
                                                            setHintCount(p => p - 1);
                                                            setUsedHints(p => p + 1);
                                                            setScore(p => Math.max(0, p - 8));
                                                            setTrust(p => Math.max(0, p - 5));
                                                            const ev = d.correct_evidence;
                                                            setCurrentHint(`강력한 힌트: '${ev.slice(0, 8)}...' 관련 증거가 피요합니다.`);
                                                        } else {
                                                            showMessage("남은 법정 힌트가 없습니다.", "error");
                                                        }
                                                    }}>
                                                    📚 재판 기록 열람 (힌트 / 남은 횟수: {hintCount})
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            );
                        })()}

                        {(stage === "win" || stage === "game_over") && (() => {
                            if(badges.length === 0 && stage === "win") assignBadges();
                            const isWin = stage === "win";
                            
                            return (
                                <div className="fade-in max-w-3xl mx-auto glass-panel p-10 text-center relative overflow-hidden">
                                    <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500"></div>
                                    
                                    <div className="text-8xl mb-6">{isWin ? '🎉' : '😱'}</div>
                                    <h1 className={`text-4xl font-bold mb-4 ${isWin ? 'text-green-400' : 'text-red-500'}`}>
                                        {isWin ? "최종 판결: 전면 승소!" : "최종 판결: 뼈아픈 패소..."}
                                    </h1>
                                    
                                    <div className="bg-slate-800/80 p-6 rounded-lg mb-8 inline-block max-w-xl border border-slate-600">
                                        <p className="text-lg italic leading-relaxed text-slate-300">
                                            {isWin 
                                                ? "판사: 변호인 측의 논리와 법적 근거가 완벽하게 일치하며 증거 능력이 타당하게 인정됩니다. 이에 피고 측의 주장을 전면 기각하고, 원고 측의 완벽한 승소를 선언합니다. 탕! 탕! 탕!" 
                                                : "판사: 변호인 측의 잦은 궤변과 부적절한 증거 남발로 인해 본 재판부는 더 이상 변호인을 신뢰할 수 없습니다. 따라서 원고 측의 청구를 모두 기각하고 패소를 선언합니다."}
                                        </p>
                                    </div>

                                    {isWin && (
                                        <div className="mb-10 text-left bg-indigo-900/30 p-6 rounded-xl border border-indigo-500/30">
                                            <div className="flex justify-between items-center border-b border-indigo-500/30 pb-4 mb-4">
                                                <div>
                                                    <div className="text-sm text-indigo-300 mb-1">판결 평가 등급</div>
                                                    <div className="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-yellow-500">{calculateGrade()} Rank</div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="text-sm text-indigo-300 mb-1">언론 보도 엔딩</div>
                                                    <div className="text-xl font-bold text-white">{determineEnding()}</div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-x-8 gap-y-3 mb-6">
                                                <div className="flex justify-between"><span className="text-slate-400">최종 획득 점수</span> <span className="font-bold">{score} pt</span></div>
                                                <div className="flex justify-between"><span className="text-slate-400">보존된 신뢰도</span> <span className="font-bold">{trust}%</span></div>
                                                <div className="flex justify-between"><span className="text-slate-400">최고 연속 반박(콤보)</span> <span className="font-bold">{maxCombo}회 연속</span></div>
                                                <div className="flex justify-between"><span className="text-slate-400">사용한 힌트 수</span> <span className="font-bold">{usedHints}회</span></div>
                                                <div className="flex justify-between"><span className="text-slate-400">숨겨진 증거 발견</span> <span className="font-bold">{bonusEvidence.length}건</span></div>
                                                <div className="flex justify-between"><span className="text-slate-400">페널티 방어(잔여 목숨)</span> <span className="font-bold">{lives}</span></div>
                                            </div>

                                            {badges.length > 0 && (
                                                <div>
                                                    <div className="text-sm text-indigo-300 mb-2 font-bold">획득한 명예 훈장</div>
                                                    <div className="flex flex-wrap gap-2">
                                                        {badges.map((b, i) => (
                                                            <span key={i} className="bg-gradient-to-r from-yellow-600 to-yellow-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow-lg">{b}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    <button className="btn-primary text-xl px-12 py-4 shadow-xl" onClick={resetGame}>
                                        {isWin ? "다른 의뢰사건 수임하기" : "재심 청구하기 (다시 도전)"}
                                    </button>
                                </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MockTrialGame />);
    </script>
</body>
</html>
