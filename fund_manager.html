<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펀드매니저 게임 | 2010년의 승부사</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; }
        .bg-pattern { background-image: radial-gradient(circle at 50% 50%, rgba(59, 130, 246, 0.1), transparent 50%); background-attachment: fixed; }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #60a5fa; }
    </style>
</head>
<body class="bg-pattern min-h-screen text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const HISTORICAL_RETURNS = [
            { name: "LG화학", return: 110.0, category: "화학", hint: "중국 경제 폭풍 성장의 최대 수혜, 기초소재 호황 추세" },
            { name: "현대중공업", return: 90.0, category: "조선", hint: "유가 상승과 선박 교체 주기 도래" },
            { name: "현대차", return: 85.0, category: "자동차", hint: "글로벌 점유율 확대, 신형 모델 폭발적 호평" },
            { name: "셀트리온", return: 60.0, category: "바이오", hint: "바이오시밀러 개발의 선두 주자, 폭발적 성장 초기" },
            { name: "엔씨소프트", return: 45.0, category: "게임", hint: "아이온 등 대작 MMORPG 글로벌 흥행" },
            { name: "삼성전자", return: 25.0, category: "IT", hint: "스마트폰 대중화 원년, 갤럭시 패권 본격 출격" },
            { name: "대한항공", return: 20.0, category: "항공", hint: "경기 반등으로 여객/화물 수요 점진적 회복세" },
            { name: "POSCO", return: 10.0, category: "철강", hint: "산업 전반의 안정적인 철강 수요 기반 방어주" },
            { name: "국고채 (안전형)", return: 3.5, category: "안전", hint: "원금 손실 걱정 없이 예금처럼 확정된 이자를 주는 자산" },
            { name: "한국전력", return: -5.0, category: "에너지", hint: "유가 상승 등 원가 압박과 전기요금 인상 억제 정책" }
        ];

        function FundManagerGame() {
            const [allocations, setAllocations] = useState(
                HISTORICAL_RETURNS.reduce((acc, asset) => ({ ...acc, [asset.name]: 0 }), {})
            );
            const [phase, setPhase] = useState('INVEST'); // 'INVEST', 'RESULT'
            const [results, setResults] = useState(null);

            const totalAllocated = Object.values(allocations).reduce((a, b) => a + b, 0);

            const handleAllocationChange = (name, amount) => {
                const current = allocations[name];
                let newVal = current + amount;
                
                if (newVal < 0) newVal = 0;
                if (newVal > 100) newVal = 100;

                const diff = newVal - current;
                if (totalAllocated + diff > 100) {
                    newVal = current + (100 - totalAllocated); // 최대 100까지만
                }

                setAllocations(prev => ({ ...prev, [name]: newVal }));
            };

            const calculateResults = () => {
                if (totalAllocated !== 100) {
                    alert("⚠️ 총 투자 비중을 합하여 정확히 100%를 맞춰야 합니다.");
                    return;
                }

                let finalReturn = 0;
                let formattedResults = [];

                HISTORICAL_RETURNS.forEach(asset => {
                    const weight = allocations[asset.name];
                    if (weight > 0) {
                        const contribution = asset.return * (weight / 100);
                        finalReturn += contribution;
                        formattedResults.push({
                            name: asset.name,
                            weight: weight,
                            returnRate: asset.return,
                            contribution: contribution
                        });
                    }
                });

                setResults({
                    items: formattedResults,
                    finalReturn: finalReturn
                });
                setPhase('RESULT');
            };

            const resetGame = () => {
                setAllocations(HISTORICAL_RETURNS.reduce((acc, asset) => ({ ...acc, [asset.name]: 0 }), {}));
                setResults(null);
                setPhase('INVEST');
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center bg-slate-900 border border-slate-700 p-6 rounded-2xl shadow-2xl mb-8">
                         <div className="flex items-center gap-4">
                            <div className="bg-blue-600/20 p-3 rounded-xl border border-blue-500/30">
                                <span className="text-4xl text-blue-400">📈</span>
                            </div>
                            <div>
                                <h1 className="text-2xl md:text-3xl font-black text-white tracking-tight">펀드매니저 게임: <span className="text-blue-400">2010년의 승부사</span></h1>
                                <p className="text-slate-400 mt-1 font-medium">시간은 2010년 5월. 자산을 배분해 1년 후 10% 이상의 수익을 쟁취하세요.</p>
                            </div>
                         </div>
                         <div className="mt-4 md:mt-0">
                            <button onClick={() => window.location.href='index.html'} className="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-300 rounded-xl font-bold transition flex items-center gap-2 border border-slate-600">
                                ⬅️ 대시보드 복귀
                            </button>
                         </div>
                    </header>

                    {phase === 'INVEST' && (
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8 relative">
                            {/* Left Panel: News & Hints */}
                            <div className="lg:col-span-4 bg-slate-800/50 backdrop-blur border border-slate-700 p-6 rounded-2xl shadow-xl flex flex-col h-full h-max">
                                <div className="mb-6 pb-4 border-b border-slate-700">
                                    <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                        <span className="animate-pulse h-2 w-2 bg-red-500 rounded-full inline-block"></span> 
                                        2010년 주요 증시 브리핑
                                    </h2>
                                    <p className="text-sm text-slate-400 mt-2">최초 스마트폰 보급, 중국발 고도성장 사이클. 기관투자자용 내부 리포트를 참조하세요.</p>
                                </div>
                                <div className="flex flex-col gap-4 overflow-y-auto pr-2" style={{maxHeight: '600px'}}>
                                    {HISTORICAL_RETURNS.map((asset, idx) => (
                                        <div key={idx} className="bg-slate-900/80 p-4 rounded-xl border-l-4 border-blue-500 hover:bg-slate-800 transition shadow">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-blue-400 font-bold text-xs tracking-widest uppercase bg-blue-500/10 px-2 py-1 rounded">{asset.category}</span>
                                                <span className="text-white font-black">{asset.name}</span>
                                            </div>
                                            <p className="text-sm text-slate-400 font-medium leading-relaxed mt-2 italic">
                                                "{asset.hint}"
                                            </p>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            {/* Right Panel: Trading Terminal */}
                            <div className="lg:col-span-8 bg-slate-900 border border-slate-700 p-6 md:p-8 rounded-2xl shadow-2xl relative">
                                <div className="mb-8 p-6 bg-slate-950 rounded-xl border border-slate-800">
                                    <h3 className="text-white font-bold text-lg mb-4 flex justify-between items-end">
                                        <span className="flex items-center gap-2"><span className="text-2xl">💼</span> 포트폴리오 비중 (TOTAL ALLOCATION)</span>
                                        <span className={`text-2xl font-black ${totalAllocated === 100 ? 'text-green-400' : 'text-blue-400'}`}>{totalAllocated}% / 100%</span>
                                    </h3>
                                    <div className="w-full h-4 bg-slate-800 rounded-full overflow-hidden shadow-inner">
                                        <div 
                                            className={`h-full transition-all duration-500 ease-out ${totalAllocated === 100 ? 'bg-gradient-to-r from-emerald-500 to-green-400' : 'bg-gradient-to-r from-blue-600 to-cyan-400'}`} 
                                            style={{ width: `${totalAllocated}%` }}
                                        ></div>
                                    </div>
                                    <div className="h-8 mt-2">
                                        {totalAllocated !== 100 && (
                                            <p className="text-rose-400 text-sm font-medium animate-pulse inline-block">
                                                * 투자를 완료하려면 잔여 자산 {100 - totalAllocated}%를 완전히 매수해야 합니다.
                                            </p>
                                        )}
                                        {totalAllocated === 100 && (
                                            <p className="text-emerald-400 text-sm font-bold flex items-center gap-1">
                                                ✓ 100% 자산구성 완료. 하단 매수 체결 버튼을 누르세요.
                                            </p>
                                        )}
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                                    {HISTORICAL_RETURNS.map(asset => (
                                        <div key={asset.name} className={`p-4 rounded-xl border transition-all duration-300 ${allocations[asset.name] > 0 ? 'bg-blue-900/30 border-blue-500/50 shadow-[0_0_15px_rgba(59,130,246,0.15)]' : 'bg-slate-800/40 border-slate-700/50'}`}>
                                            <div className="flex justify-between items-center mb-4">
                                                <span className={`font-black tracking-wide ${allocations[asset.name] > 0 ? 'text-white' : 'text-slate-400'}`}>{asset.name}</span>
                                                <div className="bg-black/50 px-3 py-1 rounded text-blue-400 font-black text-xl w-20 text-right font-mono">
                                                    {allocations[asset.name]}<span className="text-sm text-blue-500 ml-1">%</span>
                                                </div>
                                            </div>
                                            <div className="flex justify-between gap-1">
                                                <button onClick={() => handleAllocationChange(asset.name, -10)} className="flex-1 py-1.5 font-bold rounded-lg bg-slate-900/80 hover:bg-rose-900 hover:text-rose-200 border border-slate-700 hover:border-rose-500/50 transition flex items-center justify-center text-rose-400/80">-10</button>
                                                <button onClick={() => handleAllocationChange(asset.name, -5)} className="flex-1 py-1.5 font-bold rounded-lg bg-slate-900/80 hover:bg-rose-900 hover:text-rose-200 border border-slate-700 hover:border-rose-500/50 transition flex items-center justify-center text-rose-400/80">-5</button>
                                                <button onClick={() => handleAllocationChange(asset.name, 5)} className="flex-1 py-1.5 font-bold rounded-lg bg-slate-900/80 hover:bg-emerald-900 hover:text-emerald-200 border border-slate-700 hover:border-emerald-500/50 transition flex items-center justify-center text-emerald-400/80">+5</button>
                                                <button onClick={() => handleAllocationChange(asset.name, 10)} className="flex-1 py-1.5 font-bold rounded-lg bg-slate-900/80 hover:bg-emerald-900 hover:text-emerald-200 border border-slate-700 hover:border-emerald-500/50 transition flex items-center justify-center text-emerald-400/80">+10</button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <button 
                                    onClick={calculateResults}
                                    disabled={totalAllocated !== 100}
                                    className={`w-full py-5 rounded-xl text-xl font-black tracking-widest transition-all shadow-lg flex justify-center items-center gap-2
                                        ${totalAllocated === 100 ? 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white hover:-translate-y-1 hover:shadow-[0_10px_30px_rgba(59,130,246,0.3)] border border-blue-400' : 'bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700'}`}
                                >
                                    <span>{totalAllocated === 100 ? '🚀 1년 후 결과 확인하기 (투자 승인)' : '100% 매수를 완료해야 승인 가능'}</span>
                                </button>
                            </div>
                        </div>
                    )}

                    {phase === 'RESULT' && results && (
                        <div className="max-w-4xl mx-auto animate-[fadeIn_0.5s_ease-out]">
                            <div className="bg-slate-900 border border-slate-700 rounded-3xl shadow-2xl overflow-hidden">
                                
                                <div className={`p-8 md:p-12 text-center text-white relative overflow-hidden ${results.finalReturn >= 10 ? 'bg-gradient-to-br from-emerald-600 to-teal-900' : 'bg-gradient-to-br from-rose-600 to-red-900'}`}>
                                    <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                                    <div className="relative z-10">
                                        <div className="inline-block bg-black/30 backdrop-blur px-6 py-2 rounded-full text-sm font-bold tracking-widest uppercase mb-4 shadow-inner border border-white/10">
                                            2011년 5월 성적표
                                        </div>
                                        <h2 className="text-3xl md:text-5xl font-black mb-4 tracking-tight">총 포트폴리오 수익률</h2>
                                        <div className="text-6xl md:text-8xl font-black mb-8 flex justify-center items-baseline gap-2 group cursor-default font-mono">
                                            <span className={`${results.finalReturn >= 0 ? 'text-white' : 'text-red-200'}`}>
                                                {results.finalReturn > 0 ? '+' : ''}{results.finalReturn.toFixed(2)}
                                            </span>
                                            <span className="text-3xl md:text-5xl opacity-70">%</span>
                                        </div>
                                        
                                        {results.finalReturn >= 10 ? (
                                            <div className="bg-black/20 border border-emerald-400/30 p-8 rounded-2xl shadow-lg backdrop-blur mx-auto max-w-2xl transform hover:scale-105 transition duration-500">
                                                <h3 className="text-3xl font-black text-white mb-3 flex items-center justify-center gap-3"><span className="text-4xl">🎉</span> 탁월한 실적 달성!</h3>
                                                <p className="text-emerald-100 font-medium text-lg leading-relaxed">축하합니다! 거시 경제 흐름을 완벽히 읽어냈습니다.<br/>목표 수익률(10%) 초과 달성! 당신은 진정한 월스트리트의 승부사입니다.</p>
                                            </div>
                                        ) : (
                                            <div className="bg-black/20 border border-rose-400/30 p-8 rounded-2xl shadow-lg backdrop-blur mx-auto max-w-2xl transform hover:scale-105 transition duration-500">
                                                <h3 className="text-3xl font-black text-white mb-3 flex items-center justify-center gap-3"><span className="text-4xl">📉</span> 생존 마지노선 붕괴</h3>
                                                <p className="text-rose-200 font-medium text-lg leading-relaxed">목표 생존 수익률 10%에 미달했습니다.<br/>거시 경제 산업 사이클 파악에 아쉬움이 남습니다.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="p-6 md:p-10 bg-slate-900">
                                    <h3 className="text-xl font-bold text-white mb-6 flex items-center gap-2">
                                        <span className="bg-slate-800 p-2 rounded-lg text-blue-400">📊</span> 포트폴리오 기여도 상세 분석
                                    </h3>
                                    
                                    <div className="overflow-x-auto rounded-xl border border-slate-700 bg-slate-950">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-slate-800 text-slate-300 text-sm uppercase tracking-wider font-medium">
                                                    <th className="p-4 border-b border-slate-700">종목명</th>
                                                    <th className="p-4 border-b border-slate-700 text-right text-slate-400">투자 비중</th>
                                                    <th className="p-4 border-b border-slate-700 text-right text-slate-400">종목 자체 수익률</th>
                                                    <th className="p-4 border-b border-slate-700 text-right font-black text-blue-400">전체 기여도 비율</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-800">
                                                {results.items.sort((a,b) => b.contribution - a.contribution).map((item, idx) => (
                                                    <tr key={idx} className="hover:bg-slate-800/60 transition bg-transparent group">
                                                        <td className="p-4 font-black text-white">{item.name}</td>
                                                        <td className="p-4 text-slate-300 text-right font-mono bg-slate-900/50 group-hover:bg-slate-800/0">{item.weight}%</td>
                                                        <td className={`p-4 text-right font-mono ${item.returnRate > 0 ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                            {item.returnRate > 0 ? '+' : ''}{item.returnRate}%
                                                        </td>
                                                        <td className={`p-4 text-right font-black font-mono text-lg bg-blue-900/10 group-hover:bg-slate-800/0 ${item.contribution > 0 ? 'text-blue-400' : 'text-rose-400'}`}>
                                                            {item.contribution > 0 ? '+' : ''}{item.contribution.toFixed(2)}%
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>

                                    <div className="mt-10 flex flex-col md:flex-row gap-4 justify-center">
                                        <button 
                                            onClick={resetGame}
                                            className="px-8 py-4 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition shadow flex items-center justify-center gap-2 border border-slate-600 hover:border-slate-500"
                                        >
                                            <span className="text-2xl">🔄</span> 완전 초기화 및 재도전
                                        </button>
                                        <button 
                                            onClick={() => window.location.href='index.html'}
                                            className="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl transition shadow-lg shadow-indigo-600/30 flex items-center justify-center gap-2 hover:-translate-y-1"
                                        >
                                            <span className="text-2xl">🏠</span> 메인 대시보드로 복귀
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FundManagerGame />);
    </script>
</body>
</html>
