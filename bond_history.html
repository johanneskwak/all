  {year:"2020년",title:"코로나 팬데믹",image_url:"",fed_news:"제로금리와 함께 회사채 매입까지 나선 연준",keyword:"QE",event_icon:"✹",event_palette:"mint",choices:["우량 회사채 매수","현금 관망"],results:[0.20,0.00],result_texts:["정책 백스톱으로 신용프리미엄 축소 구간 수익","안전했지만 반등 랠리를 놓침"],easy_bond_explanation:"회사채도 연준이 사주겠다고 선언하면 엄청나게 강력해집니다.",beginner_tip:"가장 강력한 매수자는 중앙은행입니다.",teacher_commentary:"전례없는 회사채 지지선언에 따른 리스크 프리미엄 소멸",discussion_prompt:"정책 개입이 성과를 어떻게 가르는가?",mini_quiz:{q:"중앙은행이 회사채 지지하면 기대되는 변화는?",opts:["회사채 위험프리미엄 축소","국채 발행 중단","영구 고정금리"],ans:0,exp:"신용 스프레드 축소"}},

const LEVEL_THRESHOLDS=[0,100,250,500,900,1500,2200,3200];
const LEVEL_TITLES=["인턴","주니어 트레이더","리서치 어소시에이트","주식 분석가","채권 전략가","포트폴리오 매니저","헤지펀드 디렉터","월스트리트 레전드"];

const BADGE_DEFS=[
  {id:"first_blood",icon:"🎯",name:"First Blood",desc:"첫 정답",cls:"badge-blue"},
  {id:"double",icon:"🔥",name:"콤보 2×",desc:"2연속 정답",cls:"badge-gold"},
  {id:"triple",icon:"⚡",name:"콤보 3×",desc:"3연속 정답",cls:"badge-purple"},
  {id:"survivor",icon:"🛡️",name:"생존왕",desc:"파산 직전 생존",cls:"badge-green"},
  {id:"scholar",icon:"📚",name:"채권 학자",desc:"퀴즈 전부 정답",cls:"badge-purple"},
  {id:"perfect",icon:"👑",name:"퍼펙트",desc:"모든 선택 최적",cls:"badge-gold"},
];

function getLevel(xp){let l=0;for(let i=0;i<LEVEL_THRESHOLDS.length;i++){if(xp>=LEVEL_THRESHOLDS[i])l=i;}return l;}
function xpToNext(xp){const l=getLevel(xp);if(l>=LEVEL_THRESHOLDS.length-1)return{cur:xp,max:xp,pct:100};const nxt=LEVEL_THRESHOLDS[l+1];const cur2=LEVEL_THRESHOLDS[l];return{cur:xp-cur2,max:nxt-cur2,pct:Math.round((xp-cur2)/(nxt-cur2)*100)};}
function moneyStr(v){return(v/100).toLocaleString('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1})+"억";}
function pctStr(r){return(r>0?"+":"")+(r*100).toFixed(1)+"%";}

function FloatText({text,color,id}){return<div className="float-text" style={{color,top:"45%",left:"50%",transform:"translateX(-50%)"}}>{text}</div>;}

function XPBar({xp}){const{cur,max,pct}=xpToNext(xp);const lv=getLevel(xp);return(
  <div className="glass p-3 mb-3">
    <div className="flex justify-between text-xs font-bold mb-1">
      <span className="text-indigo-300">Lv.{lv} {LEVEL_TITLES[lv]}</span>
      <span className="text-slate-400">{cur}/{max} XP</span>
    </div>
    <div className="w-full bg-slate-700 rounded-full h-2">
      <div className="xp-bar-inner" style={{width:pct+"%"}}></div>
    </div>
  </div>
);}

function BadgeRow({earned}){return(
  <div className="glass p-3 mb-3">
    <div className="text-xs font-bold text-slate-400 mb-2">🏅 ACHIEVEMENTS</div>
    <div className="flex flex-wrap">
      {BADGE_DEFS.map(b=>{const has=earned.includes(b.id);return(
        <span key={b.id} className={`badge ${has?b.cls:"badge-locked"}`} title={b.desc}>
          {b.icon} {b.name}
        </span>
      );})}
    </div>
  </div>
);}

function MiniQuiz({quiz,onDone,xpBonus}){
  const[sel,setSel]=useState(null);
  const[done,setDone]=useState(false);
  const correct=sel===quiz.ans;
  const submit=(i)=>{if(done)return;setSel(i);setDone(true);onDone(i===quiz.ans);};
  return(
    <div className="glass p-5 mt-4 pop-in" style={{border:"2px solid rgba(245,158,11,0.4)"}}>
      <div className="flex items-center gap-2 mb-3">
        <span className="text-2xl">🧠</span>
        <span className="font-black text-amber-300">보너스 퀴즈! +{xpBonus} XP</span>
      </div>
      <p className="font-bold text-white mb-3">{quiz.q}</p>
      <div className="space-y-2">
        {quiz.opts.map((o,i)=>{
          let bg="rgba(255,255,255,0.05)";
          if(done){if(i===quiz.ans)bg="rgba(16,185,129,0.3)";else if(i===sel)bg="rgba(239,68,68,0.3)";}
          return<button key={i} onClick={()=>submit(i)} className="w-full text-left p-3 rounded-xl font-medium transition-all" style={{background:bg,border:`1px solid ${done&&i===quiz.ans?"#10b981":done&&i===sel?"#ef4444":"rgba(255,255,255,0.1)"}`,cursor:done?"default":"pointer"}}>
            {done&&i===quiz.ans?"✅ ":done&&i===sel?"❌ ":""}{o}
          </button>;
        })}
      </div>
      {done&&<div className="mt-3 p-3 rounded-xl text-sm font-medium" style={{background:"rgba(99,102,241,0.2)"}}>{correct?"🎉 정답!":"📖 해설:"} {quiz.exp}</div>}
    </div>
  );
}

function GameApp(){
  const[phase,setPhase]=useState("start");// start|play|quiz|result|end
  const[mode,setMode]=useState("학생용");
  const[balance,setBalance]=useState(10000);
  const[turn,setTurn]=useState(0);
  const[xp,setXp]=useState(0);
  const[streak,setStreak]=useState(0);
  const[bestStreak,setBestStreak]=useState(0);
  const[shield,setShield]=useState(1);
  const[hint,setHint]=useState(3);
  const[hintText,setHintText]=useState("");
  const[earned,setEarned]=useState([]);
  const[lastResult,setLastResult]=useState(null);
  const[floats,setFloats]=useState([]);
  const[correctCount,setCorrectCount]=useState(0);
  const[quizCorrectCount,setQuizCorrectCount]=useState(0);
  const[comboPop,setComboPop]=useState(false);
  const INIT=10000,SURV=6000;

  const addFloat=(text,color)=>{
    const id=Date.now();
    setFloats(f=>[...f,{id,text,color}]);
    setTimeout(()=>setFloats(f=>f.filter(x=>x.id!==id)),1600);
  };

  const earnBadge=(id)=>setEarned(e=>e.includes(id)?e:[...e,id]);

  const handleChoice=(ci)=>{
    const sc=SCENARIOS[turn];
    const best=sc.results.indexOf(Math.max(...sc.results));
    const isOk=ci===best;
    let ret=sc.results[ci];
    let usedShield=false;
    if(ret<-0.2&&shield>0){ret*=0.5;setShield(s=>s-1);usedShield=true;addFloat("🛡️ SHIELD!","#f59e0b");}
    const mult=streak>=2?(streak>=4?2.0:1.5):1.0;
    const baseXP=isOk?(80*mult):20;
    const gainXP=Math.round(baseXP);
    setXp(x=>x+gainXP);
    addFloat((ret>0?"+":"")+pctStr(ret),ret>=0?"#10b981":"#ef4444");
    setTimeout(()=>addFloat(`+${gainXP} XP`,"#818cf8"),400);
    setBalance(b=>Math.max(0,b*(1+ret)));
    if(isOk){
      const ns=streak+1;
      setStreak(ns);setBestStreak(s=>Math.max(s,ns));
      setCorrectCount(c=>c+1);
      if(ns>=2){setComboPop(true);setTimeout(()=>setComboPop(false),1200);}
      if(!earned.includes("first_blood"))earnBadge("first_blood");
      if(ns>=2)earnBadge("double");
      if(ns>=3)earnBadge("triple");
    }else{setStreak(0);}
    if(balance<=SURV+500)earnBadge("survivor");
    setLastResult({isOk,ret,usedShield,best,ci,mult,gainXP,sc});
    setPhase("result");
  };

  const handleQuizDone=(ok)=>{
    const bonus=ok?50:0;
    if(bonus)setXp(x=>x+bonus);
    if(ok){setQuizCorrectCount(c=>c+1);addFloat("+50 XP 보너스!","#f59e0b");}
  };

  const nextTurn=()=>{
    setHintText("");setLastResult(null);
    const nxt=turn+1;
    if(nxt>=SCENARIOS.length||balance<=SURV){
      if(correctCount===SCENARIOS.length)earnBadge("perfect");
      if(quizCorrectCount===SCENARIOS.length)earnBadge("scholar");
      setPhase("end");
    }else{setTurn(nxt);setPhase("play");}
  };

  const sc=SCENARIOS[turn];

  if(phase==="start")return(
    <div className="max-w-3xl mx-auto pt-10 space-y-6">
      <div className="glass p-8 text-center">
        <div className="text-5xl mb-3">📊</div>
        <h1 className="text-4xl font-black text-white mb-2">Bond History</h1>
        <p className="text-slate-400 mb-1">Premium Game — 연준의 역사적 결정 속에서 살아남아라</p>
        <div className="flex gap-2 justify-center flex-wrap mt-4 mb-6">
          {["XP 레벨 시스템","콤보 배율","보너스 퀴즈","업적 배지","실드 스킬"].map(t=><span key={t} className="chip">{t}</span>)}
        </div>
        <div className="grid grid-cols-2 gap-4 mb-6 text-left">
          <div className="glass p-4">
            <div className="text-xs text-slate-400 font-bold mb-2">모드</div>
            <select value={mode} onChange={e=>setMode(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded-xl p-2 text-white font-bold">
              <option>학생용</option><option>교사용</option>
            </select>
          </div>
          <div className="glass p-4">
            <div className="text-xs text-slate-400 font-bold mb-2">초기 자산</div>
            <div className="text-2xl font-black text-indigo-300">{moneyStr(INIT)}</div>
            <div className="text-xs text-slate-500">생존선: {moneyStr(SURV)}</div>
          </div>
        </div>
        <div className="glass p-4 text-left mb-6">
          <div className="font-bold text-amber-300 mb-2">📖 초보자 가이드</div>
          <ul className="text-sm text-slate-300 space-y-1">
            <li>• 연속 정답 시 <span className="text-amber-300 font-bold">콤보 배율</span>로 XP 보너스</li>
            <li>• 각 라운드 후 <span className="text-indigo-300 font-bold">보너스 퀴즈</span> → +50 XP</li>
            <li>• 실드: 큰 손실을 절반으로 감소 (1회)</li>
            <li>• 힌트: 최적 방향을 알려줌 (3회)</li>
          </ul>
        </div>
        <button onClick={()=>setPhase("play")} className="w-full py-4 rounded-xl font-black text-lg text-white" style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)"}}>
          트레이딩 시작 📈
        </button>
      </div>
    </div>
  );

  if(phase==="end"){
    const ratio=balance/INIT;
    const ret=(ratio-1)*100;
    const lv=getLevel(xp);
    const stars=ratio>=2?5:ratio>=1.5?4:ratio>=1.2?3:ratio>=0.9?2:1;
    return(
      <div className="max-w-2xl mx-auto pt-10">
        <div className="glass p-8 text-center">
          <div className="text-6xl mb-2">{"⭐".repeat(stars)}</div>
          <h2 className="text-3xl font-black text-white mb-1">시즌 종료!</h2>
          <div className="text-indigo-300 font-bold text-xl mb-6">Lv.{lv} {LEVEL_TITLES[lv]}</div>
          <div className="grid grid-cols-3 gap-3 mb-6">
            <div className="glass p-4"><div className="text-xs text-slate-400">최종 자산</div><div className="text-xl font-black text-white">{moneyStr(balance)}</div><div className={`text-sm font-bold mt-1 ${ret>=0?"text-green-400":"text-red-400"}`}>{ret>=0?"+":""}{ret.toFixed(1)}%</div></div>
            <div className="glass p-4"><div className="text-xs text-slate-400">총 XP</div><div className="text-xl font-black text-indigo-300">{xp}</div><div className="text-xs text-slate-500">Lv.{lv}</div></div>
            <div className="glass p-4"><div className="text-xs text-slate-400">정답률</div><div className="text-xl font-black text-white">{correctCount}/{SCENARIOS.length}</div><div className="text-xs text-slate-500">퀴즈 {quizCorrectCount}개</div></div>
          </div>
          <div className="mb-6"><BadgeRow earned={earned}/></div>
          <div className="flex gap-3 justify-center">
            <button onClick={()=>window.location.reload()} className="px-6 py-3 rounded-xl font-bold text-white" style={{background:"rgba(99,102,241,0.4)"}}>새 게임</button>
            <button onClick={()=>window.location.href="index.html"} className="px-6 py-3 rounded-xl font-bold text-white" style={{background:"rgba(255,255,255,0.1)"}}>홈으로</button>
          </div>
        </div>
      </div>
    );
  }

  const lv=getLevel(xp);
  const comboMult=streak>=4?2.0:streak>=2?1.5:1.0;

  return(
    <div className="min-h-screen">
      {floats.map(f=><FloatText key={f.id} text={f.text} color={f.color}/>)}
      {comboPop&&<div className="combo-badge">🔥 {streak}콤보!</div>}

      {/* Header */}
      <div className="glass mb-4 p-4 flex items-center justify-between flex-wrap gap-3">
        <div className="flex items-center gap-3">
          <span className="text-2xl">📊</span>
          <div>
            <div className="font-black text-white text-sm">Bond History</div>
            <div className="text-xs text-slate-400">라운드 {turn+1}/{SCENARIOS.length}</div>
          </div>
        </div>
        <div className="flex items-center gap-4">
          {streak>=2&&<div className="text-amber-400 font-black">🔥{streak}콤보 ×{comboMult}</div>}
          <div className="text-right">
            <div className="text-lg font-black text-white">{moneyStr(balance)}</div>
            <div className="text-xs text-slate-400">생존선 {moneyStr(SURV)}</div>
          </div>
        </div>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-4 gap-4">
        {/* Sidebar */}
        <div className="col-span-1 space-y-3">
          <XPBar xp={xp}/>
          <div className="glass p-3">
            <div className="grid grid-cols-2 gap-2">
              <div className="text-center p-2 rounded-xl" style={{background:"rgba(99,102,241,0.15)"}}>
                <div className="text-xs text-indigo-300 font-bold">힌트</div>
                <div className="text-xl font-black text-white">{hint}</div>
              </div>
              <div className="text-center p-2 rounded-xl" style={{background:"rgba(245,158,11,0.15)"}}>
                <div className="text-xs text-amber-300 font-bold">실드</div>
                <div className="text-xl font-black text-white">{shield}</div>
              </div>
            </div>
          </div>
          <div className="glass p-3">
            <div className="text-xs text-slate-400 font-bold mb-2">진행 상황</div>
            <div className="flex gap-1 flex-wrap">
              {SCENARIOS.map((_,i)=><div key={i} className="w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold" style={{background:i<turn?"rgba(99,102,241,0.5)":i===turn?"rgba(99,102,241,0.9)":"rgba(255,255,255,0.05)",color:i<=turn?"white":"#64748b"}}>{i+1}</div>)}
            </div>
          </div>
          <BadgeRow earned={earned}/>
        </div>

        {/* Main */}
        <div className="col-span-1 lg:col-span-3 space-y-4">
          {phase==="play"&&(
            <div className="grid md:grid-cols-2 gap-4">
              {/* Event Card */}
              <div className="glass p-5">
                {sc.image_url?(
                  <img src={sc.image_url} className="card-art mb-3" alt={sc.title} onError={e=>{e.target.style.display="none";}}/>
                ):null}
                <div className="flex flex-wrap mb-2">
                  <span className="chip">{sc.year}</span>
                  <span className="chip">🔑 {sc.keyword}</span>
                </div>
                <h2 className="text-xl font-black text-white mb-3">{sc.title}</h2>
                <div className="p-3 rounded-xl mb-3" style={{background:"rgba(255,255,255,0.04)"}}>
                  <div className="text-xs text-slate-500 font-bold mb-1">📰 FED 뉴스라인</div>
                  <p className="text-sm text-slate-300">{sc.fed_news}</p>
                </div>
                <div className="p-3 rounded-xl mb-3" style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.2)"}}>
                  <div className="text-xs text-indigo-400 font-bold mb-1">💡 핵심 포인트</div>
                  <p className="text-sm text-indigo-200">{sc.easy_bond_explanation}</p>
                </div>
                {mode==="교사용"&&(
                  <div className="p-3 rounded-xl mb-3" style={{background:"rgba(245,158,11,0.1)",border:"1px solid rgba(245,158,11,0.2)"}}>
                    <div className="text-xs text-amber-400 font-bold mb-1">📋 교사 코멘터리</div>
                    <p className="text-sm text-amber-200 mb-1">{sc.teacher_commentary}</p>
                    <p className="text-xs text-amber-300 italic">Q: {sc.discussion_prompt}</p>
                  </div>
                )}
                {hintText&&<div className="p-3 rounded-xl text-sm text-indigo-200" style={{background:"rgba(99,102,241,0.15)"}}>{hintText}</div>}
                <button onClick={()=>{if(hint>0){setHint(h=>h-1);const bi=sc.results.indexOf(Math.max(...sc.results));setHintText(`💡 ${sc.beginner_tip} → ${sc.choices[bi]} 방향이 유리합니다.`);}}} disabled={hint<=0} className="w-full mt-3 py-2 rounded-xl text-sm font-bold text-slate-400 disabled:opacity-40" style={{border:"1px dashed rgba(255,255,255,0.2)"}}>
                  힌트 사용 (-1개)
                </button>
              </div>

              {/* Choices */}
              <div>
                <h3 className="text-lg font-black text-white mb-3">⚖️ 투자 결정</h3>
                {streak>=2&&<div className="text-center mb-3 p-2 rounded-xl text-amber-400 font-bold text-sm" style={{background:"rgba(245,158,11,0.1)"}}>🔥 {streak}연속 콤보! XP ×{comboMult} 적용중</div>}
                <div className="space-y-3">
                  {sc.choices.map((c,i)=>(
                    <button key={i} onClick={()=>handleChoice(i)} className="choice-btn">
                      <div className="flex items-start gap-3">
                        <div className="text-2xl mt-0.5">{["🔵","🟠","🟢","🔴"][i]}</div>
                        <div>
                          <div className="font-bold text-white text-base">{c}</div>
                          <div className="text-xs text-slate-500 mt-1">선택지 {i+1}</div>
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
                <div className="mt-4 p-4 rounded-xl" style={{background:"rgba(255,255,255,0.03)"}}>
                  <div className="text-xs font-bold text-slate-400 mb-2">📌 판단 가이드</div>
                  <ul className="text-xs text-slate-500 space-y-1">
                    <li>• 금리 상승기 → 짧은 만기 또는 방어적 포지션</li>
                    <li>• 위기 → 국채 등 안전자산 선호</li>
                    <li>• 불확실성 → 분산 투자가 최선</li>
                  </ul>
                </div>
              </div>
            </div>
          )}

          {phase==="result"&&lastResult&&(
            <div>
              <div className="glass p-6 pop-in text-center" style={{border:`2px solid ${lastResult.isOk?"rgba(16,185,129,0.4)":"rgba(239,68,68,0.4)"}`}}>
                <div className="text-5xl mb-3">{lastResult.isOk?"🎯":"📉"}</div>
                <h2 className={`text-2xl font-black mb-2 ${lastResult.isOk?"text-green-400":"text-red-400"}`}>
                  {lastResult.isOk?"정확한 뷰였습니다!":"시장의 역풍을 맞았습니다."}
                </h2>
                <p className="text-slate-300 mb-4">{lastResult.sc.result_texts[lastResult.ci]}</p>
                <div className="flex justify-center gap-4 mb-4 flex-wrap">
                  <div className="glass p-3 text-center min-w-[100px]">
                    <div className="text-xs text-slate-400">수익률</div>
                    <div className={`text-2xl font-black ${lastResult.ret>=0?"text-green-400":"text-red-400"}`}>{pctStr(lastResult.ret)}</div>
                  </div>
                  <div className="glass p-3 text-center min-w-[100px]">
                    <div className="text-xs text-slate-400">획득 XP</div>
                    <div className="text-2xl font-black text-indigo-300">+{lastResult.gainXP}</div>
                  </div>
                  {lastResult.usedShield&&<div className="glass p-3 text-center min-w-[100px]">
                    <div className="text-xs text-slate-400">실드</div>
                    <div className="text-2xl font-black text-amber-400">🛡️ 작동!</div>
                  </div>}
                </div>
                {!lastResult.isOk&&<div className="text-sm text-slate-400 mb-4">최적 선택: <span className="text-green-400 font-bold">{lastResult.sc.choices[lastResult.best]}</span></div>}
                <div className="glass p-4 text-left mb-4">
                  <div className="font-bold text-indigo-300 mb-1">📖 개념 복습: {lastResult.sc.keyword}</div>
                  <p className="text-sm text-slate-300">{lastResult.sc.easy_bond_explanation}</p>
                </div>
                <MiniQuiz quiz={lastResult.sc.mini_quiz} onDone={handleQuizDone} xpBonus={50}/>
                <button onClick={nextTurn} className="mt-5 px-8 py-3 rounded-xl font-black text-white" style={{background:"linear-gradient(135deg,#6366f1,#8b5cf6)"}}>
                  {turn+1>=SCENARIOS.length?"최종 결과 보기 🏆":"다음 라운드 →"}
                </button>
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<GameApp/>);
</script>
</body>
</html>
