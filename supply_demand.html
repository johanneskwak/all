<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수요와 공급 시뮬레이션 | Teacher Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #0f172a; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-border { box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        
        /* Dice Animation */
        .die-container { perspective: 1000px; width: 60px; height: 60px; }
        .die { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.5s; 
        }
        .die-face {
            position: absolute; width: 60px; height: 60px; background: white; border: 2px solid #ddd;
            display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 800; color: #1e293b;
            border-radius: 8px; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .front  { transform: rotateY(0deg) translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        @keyframes rolling {
            0% { transform: rotateX(0deg) rotateY(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg); }
        }
        .is-rolling { animation: rolling 0.3s infinite linear; }

        /* Card styles */
        .mission-card {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border: 2px solid #4f46e5;
            transition: transform 0.3s;
        }
        .mission-card:hover { transform: translateY(-5px) scale(1.02); }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = window.Motion || { motion: { div: ({children, ...props}) => <div {...props}>{children}</div> }, AnimatePresence: ({children}) => <>{children}</> };

        const ITEMS = {
            '돌': { icon: 'mountain', color: 'text-slate-400', basePrice: 1 },
            '나무': { icon: 'tree-pine', color: 'text-emerald-400', basePrice: 2 },
            '뗀석기': { icon: 'hammer', color: 'text-amber-600', basePrice: 20 },
            '옥수수': { icon: 'wheat', color: 'text-yellow-400', basePrice: 3 },
            '사과': { icon: 'apple', color: 'text-rose-500', basePrice: 4 },
            '바나나': { icon: 'banana', color: 'text-yellow-300', basePrice: 5 }
        };

        const PHASES = [
            "자원/미션 배분", 
            "자유 물물교환", 
            "가치 공개 (레몬 시장)", 
            "화폐 도입 & 중앙 시장", 
            "다이나믹 경매", 
            "결과 및 자산 평가"
        ];

        const NEWS_EVENTS = [
            { id: 1, title: "🔥 극심한 가뭄", desc: "옥수수 공급 부족 -> 가격 폭등 (+5)", target: "옥수수", change: 5, icon: 'sun' },
            { id: 2, title: "🪓 벌목 기술 발전", desc: "나무 공급 증가 -> 가격 하락 (-1)", target: "나무", change: -1, icon: 'axe' },
            { id: 3, title: "🦍 원숭이 떼 습격", desc: "바나나 품귀 -> 가격 폭등 (+4)", target: "바나나", change: 4, icon: 'alert-triangle' },
            { id: 4, title: "🍎 사과 효능 TV 방영", desc: "사과 수요 급증 -> 가격 상승 (+3)", target: "사과", change: 3, icon: 'tv' }
        ];

        const INITIAL_GROUPS = {
            '1조': { resources: {'돌': 15, '나무': 2, '뗀석기': 1, '옥수수': 0, '사과': 0, '바나나': 2}, money: 0, debt: 0, mission: '사과 10개, 옥수수 5개 모으기' },
            '2조': { resources: {'돌': 0, '나무': 12, '뗀석기': 0, '옥수수': 5, '사과': 10, '바나나': 0}, money: 0, debt: 0, mission: '돌 10개, 바나나 5개 모으기' },
            '3조': { resources: {'돌': 3, '나무': 0, '뗀석기': 0, '옥수수': 15, '사과': 2, '바나나': 10}, money: 0, debt: 0, mission: '나무 10개, 사과 5개 모으기' },
            '4조': { resources: {'돌': 5, '나무': 5, '뗀석기': 1, '옥수수': 2, '사과': 15, '바나나': 5}, money: 0, debt: 0, mission: '뗀석기 2개 모으기' }
        };

        // UI Components
        function Icon({ name, className = "w-5 h-5" }) {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        }

        function Dice({ value, isRolling, onEndRolling }) {
            const rotations = {
                1: 'rotateX(0deg) rotateY(0deg)',
                2: 'rotateX(0deg) rotateY(-90deg)',
                3: 'rotateX(0deg) rotateY(-180deg)',
                4: 'rotateX(0deg) rotateY(90deg)',
                5: 'rotateX(-90deg) rotateY(0deg)',
                6: 'rotateX(90deg) rotateY(0deg)'
            };

            return (
                <div className="die-container">
                    <div className={`die ${isRolling ? 'is-rolling' : ''}`} style={!isRolling ? { transform: rotations[value] } : {}}>
                        <div className="die-face front">1</div>
                        <div className="die-face right">2</div>
                        <div className="die-face back">3</div>
                        <div className="die-face left">4</div>
                        <div className="die-face top">5</div>
                        <div className="die-face bottom">6</div>
                    </div>
                </div>
            );
        }

        function InventoryItem({ name, count }) {
            const item = ITEMS[name];
            return (
                <div className="flex flex-col items-center p-3 rounded-xl bg-slate-800/50 border border-slate-700/50 group hover:border-indigo-500/50 transition-all">
                    <Icon name={item.icon} className={`w-8 h-8 mb-1 ${item.color} group-hover:scale-110 transition-transform`} />
                    <span className="text-[10px] text-slate-400 font-bold mb-1">{name}</span>
                    <span className="text-lg font-black text-white">{count}</span>
                </div>
            );
        }

        function MissionCard({ groupName, mission }) {
            return (
                <div className="mission-card p-6 rounded-2xl shadow-xl relative overflow-hidden h-full flex flex-col justify-between">
                    <div className="absolute top-0 right-0 p-4 opacity-10">
                        <Icon name="scroll" className="w-20 h-20" />
                    </div>
                    <div>
                        <div className="text-xs font-black text-indigo-300 tracking-widest uppercase mb-2">Secret Mission</div>
                        <h3 className="text-2xl font-black text-white mb-4">{groupName}</h3>
                        <p className="text-indigo-100 font-medium leading-relaxed italic">"{mission}"</p>
                    </div>
                    <div className="mt-6 flex justify-between items-end">
                        <div className="flex -space-x-2">
                            <div className="w-8 h-8 rounded-full border-2 border-indigo-900 bg-slate-700 flex items-center justify-center text-[10px] font-bold">🔒</div>
                        </div>
                        <span className="text-[10px] font-bold text-indigo-400/60 uppercase">Confidential</span>
                    </div>
                </div>
            );
        }

        // Main App
        function GameApp() {
            const [groups, setGroups] = useState(INITIAL_GROUPS);
            const [phase, setPhase] = useState(0);
            const [market, setMarket] = useState({'바나나': 4, '사과': 5, '옥수수': 5, '나무': 3});
            const [prices, setPrices] = useState(Object.keys(ITEMS).reduce((acc, k) => ({...acc, [k]: ITEMS[k].basePrice}), {}));
            const [newsHistory, setNewsHistory] = useState([]);
            const [diceValue, setDiceValue] = useState(1);
            const [isRolling, setIsRolling] = useState(false);
            const [logs, setLogs] = useState([]);

            const log = (msg) => setLogs(prev => [msg, ...prev].slice(0, 5));

            const rollDice = () => {
                if(isRolling) return;
                setIsRolling(true);
                log("주사위를 굴립니다...");
                setTimeout(() => {
                    const val = Math.floor(Math.random() * 6) + 1;
                    setDiceValue(val);
                    setIsRolling(false);
                    log(`주사위 결과: ${val}`);
                }, 1500);
            };

            const applyNews = (event) => {
                setPrices(prev => ({ ...prev, [event.target]: Math.max(1, prev[event.target] + event.change) }));
                setNewsHistory(prev => [event.title, ...prev]);
                log(`${event.title} 뉴스가 전파되었습니다.`);
            };

            const handleLoan = (target, amount) => {
                setGroups(prev => ({
                    ...prev,
                    [target]: { ...prev[target], money: prev[target].money + amount, debt: prev[target].debt + amount }
                }));
                log(`${target}에 ${amount}코인 대출 승인`);
            };

            const handleTrade = (from, to, item, amount) => {
                if(groups[from].resources[item] < amount) return alert("자원이 부족합니다.");
                setGroups(prev => {
                    const next = {...prev};
                    next[from].resources[item] -= amount;
                    next[to].resources[item] += amount;
                    return next;
                });
                log(`${from} → ${to}: ${item} ${amount}개 교환`);
            };

            const handleMarketBuy = (group, item) => {
                const price = Math.floor(prices[item] * 1.1);
                if(groups[group].money < price) return alert("돈이 부족합니다.");
                if(market[item] <= 0) return alert("품절되었습니다.");

                setGroups(prev => ({
                    ...prev,
                    [group]: { 
                        ...prev[group], 
                        money: prev[group].money - price, 
                        resources: { ...prev[group].resources, [item]: prev[group].resources[item] + 1 } 
                    }
                }));
                setMarket(prev => ({ ...prev, [item]: prev[item] - 1 }));
                log(`${group}이(가) 시장에서 ${item}을(를) 구매했습니다.`);
            };

            const handleMarketSell = (group, item) => {
                const price = Math.floor(prices[item] * 0.9);
                if(groups[group].resources[item] <= 0) return alert("아이템이 없습니다.");

                setGroups(prev => ({
                    ...prev,
                    [group]: { 
                        ...prev[group], 
                        money: prev[group].money + price, 
                        resources: { ...prev[group].resources, [item]: prev[group].resources[item] - 1 } 
                    }
                }));
                setMarket(prev => ({ ...prev, [item]: prev[item] + 1 }));
                log(`${group}이(가) 시장에 ${item}을(를) 판매했습니다.`);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header */}
                    <header className="p-6 border-b border-white/5 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="bg-indigo-600 p-2 rounded-lg shadow-lg shadow-indigo-500/20">
                                <Icon name="scale" className="text-white w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-white tracking-tight">Supply & Demand Simulator</h1>
                                <div className="flex items-center gap-2 mt-0.5">
                                    <span className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Teacher Dashboard / Step {phase + 1}: {PHASES[phase]}</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button onClick={rollDice} disabled={isRolling} className="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-xl border border-slate-700 transition">
                                <Dice value={diceValue} isRolling={isRolling} />
                                <span className="text-xs font-black uppercase text-slate-300">Roll Edge</span>
                            </button>
                            <button onClick={() => window.location.href='index.html'} className="text-xs font-bold text-slate-400 hover:text-white transition">Exit Game</button>
                        </div>
                    </header>

                    <div className="flex-1 flex overflow-hidden">
                        {/* Sidebar: Teacher Controls */}
                        <aside className="w-80 border-r border-white/5 bg-slate-900/30 p-6 overflow-y-auto hidden lg:block">
                            <div className="space-y-8">
                                <div>
                                    <h2 className="text-[10px] font-black uppercase text-indigo-400 tracking-tighter mb-4">Phase Control</h2>
                                    <div className="space-y-2">
                                        {PHASES.map((p, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => setPhase(i)}
                                                className={`w-full text-left p-3 rounded-xl text-xs font-bold transition-all border ${phase === i ? 'bg-indigo-600 border-indigo-400 text-white shadow-lg shadow-indigo-500/20' : 'bg-slate-800/40 border-transparent text-slate-400 hover:bg-slate-700/50'}`}
                                            >
                                                {i+1}. {p}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-[10px] font-black uppercase text-rose-400 tracking-tighter mb-4">News Flash</h2>
                                    <div className="grid grid-cols-1 gap-2">
                                        {NEWS_EVENTS.map(n => (
                                            <button key={n.id} onClick={() => applyNews(n)} className="p-3 bg-slate-800/60 border border-slate-700 rounded-xl hover:border-rose-500/50 transition-all text-left">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <Icon name={n.icon} className="w-3 h-3 text-rose-400" />
                                                    <span className="text-[11px] font-black text-white">{n.title}</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500">{n.desc}</p>
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div>
                                    <h2 className="text-[10px] font-black uppercase text-emerald-400 tracking-tighter mb-4">Central Bank</h2>
                                    <div className="bg-slate-800/60 p-4 rounded-2xl border border-slate-700">
                                        <select id="loan_target" className="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-xs mb-2 outline-none focus:border-indigo-500">
                                            {Object.keys(groups).map(g => <option key={g} value={g}>{g}</option>)}
                                        </select>
                                        <div className="flex gap-2">
                                            <button onClick={() => handleLoan(document.getElementById('loan_target').value, 10)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-[10px] font-black uppercase">+10 Coin</button>
                                            <button onClick={() => handleLoan(document.getElementById('loan_target').value, 50)} className="flex-1 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-lg text-[10px] font-black uppercase">+50 Coin</button>
                                        </div>
                                    </div>
                                </div>

                                <div className="p-4 bg-indigo-950/30 rounded-2xl border border-indigo-500/20">
                                    <h2 className="text-[10px] font-black uppercase text-indigo-400 tracking-tighter mb-2">Game Logs</h2>
                                    <div className="space-y-1">
                                        {logs.map((l, i) => <p key={i} className="text-[10px] text-indigo-200/60 leading-tight">› {l}</p>)}
                                    </div>
                                </div>
                            </div>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 p-8 overflow-y-auto">
                            <AnimatePresence mode="wait">
                                {phase === 0 && (
                                    <motion.div key="p0" initial={{opacity:0, y:20}} animate={{opacity:1, y:0}} exit={{opacity:0, y:-20}} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {Object.entries(groups).map(([name, data]) => (
                                            <MissionCard key={name} groupName={name} mission={data.mission} />
                                        ))}
                                    </motion.div>
                                )}

                                {phase >= 1 && phase < 5 && (
                                    <motion.div key="p-main" initial={{opacity:0}} animate={{opacity:1}} className="space-y-10">
                                        {/* Status Cards */}
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                            {/* Price Board */}
                                            <div className="glass p-6 rounded-3xl col-span-1">
                                                <h3 className="text-sm font-black text-white mb-4 flex items-center gap-2">
                                                    <Icon name="trending-up" className="text-indigo-400" />
                                                    시장 시세표
                                                </h3>
                                                <div className="grid grid-cols-2 gap-3">
                                                    {Object.entries(prices).map(([name, price]) => (
                                                        <div key={name} className="flex justify-between items-center p-3 rounded-2xl bg-slate-900 border border-white/5">
                                                            <div className="flex items-center gap-2">
                                                                <Icon name={ITEMS[name].icon} className={`w-4 h-4 ${ITEMS[name].color}`} />
                                                                <span className="text-xs font-bold">{name}</span>
                                                            </div>
                                                            <span className="text-sm font-black text-white">{price} <span className="text-[8px] text-slate-500">C</span></span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>

                                            {/* Trade Panel */}
                                            <div className="glass p-6 rounded-3xl col-span-2">
                                                <h3 className="text-sm font-black text-white mb-4 flex items-center gap-2">
                                                    <Icon name="repeat" className="text-indigo-400" />
                                                    거래 오퍼레이션
                                                </h3>
                                                {phase === 1 ? (
                                                     <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div className="space-y-4">
                                                            <div className="flex gap-2">
                                                                <select id="trade_from" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none focus:border-indigo-500 text-white">
                                                                    {Object.keys(groups).map(g => <option key={g} value={g}>{g} (주는 조)</option>)}
                                                                </select>
                                                                <select id="trade_to" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none focus:border-indigo-500 text-white">
                                                                    {Object.keys(groups).map(g => <option key={g} value={g}>{g} (받는 조)</option>)}
                                                                </select>
                                                            </div>
                                                            <div className="flex gap-2">
                                                                <select id="trade_item" className="flex-[2] bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs outline-none focus:border-indigo-500 text-white">
                                                                    {Object.keys(ITEMS).map(i => <option key={i} value={i}>{i}</option>)}
                                                                </select>
                                                                <input id="trade_amount" type="number" defaultValue="1" min="1" className="flex-1 bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-center text-white" />
                                                            </div>
                                                            <button 
                                                                onClick={() => handleTrade(
                                                                    document.getElementById('trade_from').value, 
                                                                    document.getElementById('trade_to').value, 
                                                                    document.getElementById('trade_item').value, 
                                                                    parseInt(document.getElementById('trade_amount').value)
                                                                )}
                                                                className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black text-xs uppercase tracking-widest shadow-lg shadow-indigo-600/20"
                                                            >자원 이동 확정</button>
                                                        </div>
                                                        <div className="bg-slate-900/50 p-4 rounded-2xl flex flex-col justify-center">
                                                            <p className="text-[11px] text-slate-400 leading-relaxed italic text-center">
                                                                "자유 물물교환 단계입니다. 기준 가격이 없으므로 조원들과 협상을 통해 필요한 자원을 확보하세요."
                                                            </p>
                                                        </div>
                                                     </div>
                                                ) : (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        <div className="space-y-4">
                                                            <select id="market_target" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white">
                                                                {Object.keys(groups).map(g => <option key={g} value={g}>{g}</option>)}
                                                            </select>
                                                            <select id="market_item" className="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-xs text-white">
                                                                {Object.keys(market).map(i => <option key={i} value={i}>{i} (잔고: {market[i]})</option>)}
                                                            </select>
                                                            <div className="flex gap-2">
                                                                <button onClick={() => handleMarketBuy(document.getElementById('market_target').value, document.getElementById('market_item').value)} className="flex-1 bg-indigo-600 hover:bg-indigo-500 py-3 rounded-xl font-black text-xs uppercase tracking-widest">Buy (+10%)</button>
                                                                <button onClick={() => handleMarketSell(document.getElementById('market_target').value, document.getElementById('market_item').value)} className="flex-1 bg-slate-800 hover:bg-slate-700 py-3 rounded-xl font-black text-xs uppercase tracking-widest border border-slate-700">Sell (-10%)</button>
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-2 gap-2">
                                                            {Object.entries(market).map(([name, count]) => (
                                                                <div key={name} className="p-3 bg-slate-950 border border-white/5 rounded-2xl flex justify-between items-center">
                                                                    <span className="text-[10px] font-bold text-slate-400">{name}</span>
                                                                    <span className={`text-sm font-black ${count > 0 ? 'text-indigo-400' : 'text-rose-500'}`}>{count}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                    </div>
                                                )}
                                            </div>
                                        </div>

                                        {/* Inventory List */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6">
                                            {Object.entries(groups).map(([name, data]) => (
                                                <div key={name} className="glass rounded-[2rem] p-6 relative group overflow-hidden">
                                                    <div className="absolute -top-10 -right-10 w-24 h-24 bg-indigo-500/5 rounded-full group-hover:scale-150 transition-transform duration-700"></div>
                                                    <div className="flex justify-between items-center mb-6">
                                                        <h4 className="text-xl font-black text-white">{name}</h4>
                                                        <div className="flex items-center gap-1.5 bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">
                                                            <span className="text-xs font-black text-emerald-400">{data.money}</span>
                                                            <span className="text-[10px] text-emerald-500 font-bold uppercase">Coin</span>
                                                        </div>
                                                    </div>
                                                    <div className="grid grid-cols-3 gap-2">
                                                        {Object.entries(data.resources).map(([res, count]) => (
                                                            <InventoryItem key={res} name={res} count={count} />
                                                        ))}
                                                    </div>
                                                    {data.debt > 0 && (
                                                        <div className="mt-4 p-2 rounded-xl bg-rose-500/10 border border-rose-500/20 flex justify-between items-center">
                                                            <span className="text-[10px] font-bold text-rose-400 uppercase">Total Debt</span>
                                                            <span className="text-xs font-black text-rose-300">{data.debt} C</span>
                                                        </div>
                                                    )}
                                                </div>
                                            ))}
                                        </div>
                                    </motion.div>
                                )}

                                {phase === 5 && (
                                    <motion.div key="p5" initial={{opacity:0, scale:0.95}} animate={{opacity:1, scale:1}} className="max-w-4xl mx-auto space-y-8 pb-20">
                                        <div className="text-center mb-10">
                                            <h2 className="text-4xl font-black text-white mb-2">Game Over</h2>
                                            <p className="text-slate-400">최종 순자산 기준 자본주의 승자가 결정되었습니다.</p>
                                        </div>

                                        <div className="grid grid-cols-1 gap-4">
                                            {Object.entries(groups)
                                                .map(([name, data]) => {
                                                    const itemValue = Object.entries(data.resources).reduce((sum, [r, c]) => sum + (c * prices[r]), 0);
                                                    const finalAsset = data.money + itemValue - (data.debt * 1.05);
                                                    return { name, itemValue, cash: data.money, debt: data.debt * 1.05, finalAsset: Math.round(finalAsset * 10) / 10 };
                                                })
                                                .sort((a,b) => b.finalAsset - a.finalAsset)
                                                .map((res, i) => (
                                                    <div key={res.name} className={`glass p-6 rounded-[2.5rem] flex flex-col md:flex-row justify-between items-center gap-6 border-2 ${i === 0 ? 'border-indigo-500/50 scale-105 shadow-2xl shadow-indigo-500/10' : 'border-transparent opacity-80'}`}>
                                                        <div className="flex items-center gap-6">
                                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center font-black text-xl ${i===0 ? 'bg-yellow-400 text-slate-900 shadow-[0_0_20px_rgba(250,204,21,0.5)]' : 'bg-slate-800 text-slate-400'}`}>
                                                                {i + 1}
                                                            </div>
                                                            <div>
                                                                <h4 className="text-2xl font-black text-white">{res.name}</h4>
                                                                <p className="text-xs text-slate-500 font-bold uppercase tracking-widest">{i === 0 ? 'Global Champion' : 'Participant'}</p>
                                                            </div>
                                                        </div>
                                                        <div className="flex items-center gap-8">
                                                            <div className="text-center">
                                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-1">Item Value</p>
                                                                <p className="text-sm font-black text-indigo-300">{res.itemValue}</p>
                                                            </div>
                                                            <div className="text-center">
                                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-1">Debt+Int.</p>
                                                                <p className="text-sm font-black text-rose-400">-{res.debt.toFixed(1)}</p>
                                                            </div>
                                                            <div className="text-right ml-4">
                                                                <p className="text-[10px] text-slate-500 font-bold uppercase mb-1">Net Worth</p>
                                                                <p className={`text-4xl font-black ${i === 0 ? 'text-indigo-400' : 'text-white'}`}>{res.finalAsset}</p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))
                                            }
                                        </div>
                                        
                                        <div className="flex justify-center mt-12">
                                            <button onClick={() => window.location.reload()} className="px-8 py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-black rounded-2xl shadow-xl transition-all hover:-translate-y-1">새 게임 시작</button>
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GameApp />);
    </script>
</body>
</html>
